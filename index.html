<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Prompt PRO</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, select, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    textarea {
      height: 220px;
      background: #1e293b;
      color: #22c55e;
    }
  </style>
</head>
<body>

<h2>🐱🐶 Gerador de Prompt PRO</h2>

<label>Fala do Gato:</label>
<input id="gato">

<label>Fala do Cachorro:</label>
<input id="cachorro">

<label>Quem começa:</label>
<select id="quem">
  <option value="gato">Gato</option>
  <option value="cachorro">Cachorro</option>
</select>

<label>Tem gargalhada?</label>
<select id="risada">
  <option value="sim">Sim</option>
  <option value="nao">Não</option>
</select>

<button onclick="gerar()">Gerar Prompt</button>
<button onclick="limpar()">Limpar</button>

<textarea id="saida"></textarea>

<script>
function gerar() {
  const gato = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem = document.getElementById("quem").value;
  const risada = document.getElementById("risada").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let prompt = `
Cena: podcast leve em estúdio moderno, iluminação quente.

Personagens:
- Gato cinza sentado à esquerda
- Cachorro caramelo sentado à direita

Regra obrigatória:
Cada personagem fala apenas na sua vez. Não misturar falas.

Sequência:
`;

  if (quem === "gato") {
    prompt += `
1. O gato fala:
"${gato}"

2. O cachorro responde:
"${cachorro}"
`;
  } else {
    prompt += `
1. O cachorro fala:
"${cachorro}"

2. O gato responde:
"${gato}"
`;
  }

  prompt += `
3. ${
    risada === "sim"
      ? "Os dois riem juntos de forma natural e descontraída."
      : "Eles ficam em silêncio por um instante, clima leve."
}
`;

  document.getElementById("saida").value = prompt.trim();
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
