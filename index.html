<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador PRO</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 600px;
  margin: auto;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

label {
  font-size: 14px;
  opacity: 0.8;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 6px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.normal { background:#3b82f6; }
.engracado { background:#f59e0b; }
.treta { background:#ef4444; }
.viral { background:#8b5cf6; }
.lite { background:#22c55e; }
.extend { background:#06b6d4; }

textarea {
  width: 100%;
  height: 260px;
  margin-top: 10px;
  border-radius: 10px;
  padding: 10px;
  background: #020617;
  color: #22c55e;
}
</style>
</head>

<body>

<h2>🐱🐶 Gerador PRO</h2>

<div class="box">

<label>Quem começa falando?</label>
<select id="quem">
  <option value="gato">🐱 Gato começa</option>
  <option value="cachorro">🐶 Cachorro começa</option>
</select>

<label>🐱 Fala do gato</label>
<input id="gato" placeholder="Digite aqui">

<label>🐶 Fala do cachorro</label>
<input id="cachorro" placeholder="Digite aqui">

</div>

<div class="box">
<button class="normal" onclick="setEstilo('normal')">Normal</button>
<button class="engracado" onclick="setEstilo('engracado')">Engraçado</button>
<button class="treta" onclick="setEstilo('treta')">Treta</button>
<button class="viral" onclick="setEstilo('viral')">Viral</button>
</div>

<div class="box">
<button class="lite" onclick="gerar()">Gerar JSON</button>
<button class="extend" onclick="extender()">Extender Cena</button>
</div>

<textarea id="saida"></textarea>

<script>

let estilo = "normal";
let cena = null;

function setEstilo(e){ estilo = e; }

function gerar(){

  let gato = document.getElementById("gato").value;
  let cachorro = document.getElementById("cachorro").value;
  let quem = document.getElementById("quem").value;

  if(!gato || !cachorro){
    alert("Preencha as falas");
    return;
  }

  let first, second;

  if(quem === "gato"){
    first = { id:"character_LEFT", voice:"Rasalgethi", line:gato };
    second = { id:"character_RIGHT", voice:"Achird", line:cachorro };
  } else {
    first = { id:"character_RIGHT", voice:"Achird", line:cachorro };
    second = { id:"character_LEFT", voice:"Rasalgethi", line:gato };
  }

  cena = {
    style: estilo,
    camera: { duration_seconds: 8 },
    characters: [
      { id:"character_LEFT", voice_id:"Rasalgethi" },
      { id:"character_RIGHT", voice_id:"Achird" }
    ],
    sequence: [
      { timestamp:"0-3", character:first.id, line:first.line },
      { timestamp:"3-6", character:second.id, line:second.line }
    ]
  };

  render();
}

function extender(){

  if(!cena){
    alert("Gere primeiro");
    return;
  }

  let dur = cena.camera.duration_seconds;

  let ultima = cena.sequence[cena.sequence.length-1];

  let proximo = ultima.character === "character_LEFT"
    ? "character_RIGHT"
    : "character_LEFT";

  cena.sequence.push({
    timestamp: dur + "-" + (dur+4),
    character: proximo,
    line: "continua..."
  });

  cena.camera.duration_seconds += 8;

  render();
}

function render(){
  document.getElementById("saida").value =
    JSON.stringify(cena, null, 2);
}

</script>

</body>
</html>
