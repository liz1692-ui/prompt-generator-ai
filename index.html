<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gerador JSON VEO3</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 720px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 14px;
}

.box h3 {
  margin: 0 0 10px 0;
  font-size: 14px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.campo-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #94a3b8;
  margin-top: 12px;
  margin-bottom: 4px;
}

.contador {
  font-size: 11px;
  color: #475569;
  transition: color 0.2s;
}

textarea.entrada {
  width: 100%;
  height: 72px;
  border-radius: 10px;
  padding: 10px 12px;
  background: #1e293b;
  color: white;
  font-size: 14px;
  font-family: Arial;
  border: 1px solid transparent;
  resize: none;
  transition: border 0.15s;
}

textarea.entrada:focus {
  outline: none;
  border-color: #334155;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
}

.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  flex: 1;
  min-width: 80px;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid transparent;
  font-weight: bold;
  cursor: pointer;
  font-size: 13px;
  transition: border 0.15s, opacity 0.15s;
  color: white;
  opacity: 0.7;
}

button.ativo {
  border: 2px solid white;
  opacity: 1;
}

button:not(.ativo):hover { opacity: 0.9; }

.normal    { background: #3b82f6; }
.engracado { background: #f59e0b; color: #000; }
.treta     { background: #ef4444; }
.viral     { background: #8b5cf6; }
.dur       { background: #0e7490; }
.lite      { background: #22c55e; color: #000; }
.fast      { background: #ef4444; }
.copiar    { background: #1e293b; }
.download  { background: #0e7490; }
.limpar    { background: #334155; }

textarea#saida {
  width: 100%;
  height: 480px;
  margin-top: 14px;
  border-radius: 10px;
  padding: 14px;
  background: #020617;
  color: #22c55e;
  font-family: monospace;
  font-size: 12px;
  border: 1px solid #1e293b;
  resize: vertical;
}

#status {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  height: 18px;
}
</style>
</head>

<body>

<h2>Gerador JSON VEO3 — Podcast</h2>

<div class="box">
  <h3>Falas</h3>

  <label class="campo-label">
    Gato (voz Rasalgethi)
    <span id="count-gato" class="contador">0 / 200</span>
  </label>
  <textarea class="entrada" id="gato" maxlength="200" placeholder="Digite a fala do gato..."></textarea>

  <label class="campo-label">
    Cachorro (voz Achird)
    <span id="count-cachorro" class="contador">0 / 200</span>
  </label>
  <textarea class="entrada" id="cachorro" maxlength="200" placeholder="Digite a fala do cachorro..."></textarea>

  <select id="quem">
    <option value="gato">Gato começa</option>
    <option value="cachorro">Cachorro começa</option>
  </select>
</div>

<div class="box">
  <h3>Estilo</h3>
  <div class="btn-group" id="grupo-estilo">
    <button class="normal ativo"  onclick="setEstilo('normal',    this)">Normal</button>
    <button class="engracado"     onclick="setEstilo('engracado', this)">Engraçado</button>
    <button class="treta"         onclick="setEstilo('treta',     this)">Treta</button>
    <button class="viral"         onclick="setEstilo('viral',     this)">Viral</button>
  </div>
</div>

<div class="box">
  <h3>Duração do Vídeo</h3>
  <div class="btn-group" id="grupo-duracao">
    <button class="dur ativo" onclick="setDuracao(8,  this)">8 seg</button>
    <button class="dur"       onclick="setDuracao(12, this)">12 seg</button>
    <button class="dur"       onclick="setDuracao(16, this)">16 seg</button>
  </div>
</div>

<div class="box">
  <h3>Modelo VEO</h3>
  <div class="btn-group">
    <button class="lite" onclick="gerar('lite')">VEO LITE</button>
    <button class="fast" onclick="gerar('fast')">VEO FAST</button>
  </div>
</div>

<div class="box">
  <div class="btn-group">
    <button class="copiar"   onclick="copiar()">Copiar JSON</button>
    <button class="download" onclick="baixar()">Baixar JSON</button>
    <button class="limpar"   onclick="limpar()">Limpar</button>
  </div>
</div>

<textarea id="saida" readonly placeholder="O prompt JSON aparecerá aqui..."></textarea>
<div id="status"></div>

<script>

let estiloAtual  = "normal";
let duracaoAtual = 8;

const TONS = {
  normal:    { gato: "calm natural",       cachorro: "calm natural"       },
  engracado: { gato: "sarcastic mocking",  cachorro: "confused amused"    },
  treta:     { gato: "provocative bold",   cachorro: "irritated tense"    },
  viral:     { gato: "meme humor absurd",  cachorro: "shocking impactful" }
};

// --- Contadores de caracteres ---

function setupContador(idCampo, idContador) {
  const campo = document.getElementById(idCampo);
  const cont  = document.getElementById(idContador);
  const max   = parseInt(campo.getAttribute("maxlength"), 10);
  campo.addEventListener("input", () => {
    const len = campo.value.length;
    cont.textContent = `${len} / ${max}`;
    cont.style.color = len > max * 0.9 ? "#f87171" : "#475569";
    salvarStorage();
  });
}

setupContador("gato",     "count-gato");
setupContador("cachorro", "count-cachorro");

// --- Estado: estilo ---

function setEstilo(estilo, btn) {
  estiloAtual = estilo;
  document.querySelectorAll("#grupo-estilo button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  salvarStorage();
}

// --- Estado: duração ---

function setDuracao(dur, btn) {
  duracaoAtual = dur;
  document.querySelectorAll("#grupo-duracao button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  salvarStorage();
}

// --- localStorage ---

function salvarStorage() {
  localStorage.setItem("veo3_gato",     document.getElementById("gato").value);
  localStorage.setItem("veo3_cachorro", document.getElementById("cachorro").value);
  localStorage.setItem("veo3_quem",     document.getElementById("quem").value);
  localStorage.setItem("veo3_estilo",   estiloAtual);
  localStorage.setItem("veo3_duracao",  duracaoAtual);
}

function restaurarStorage() {
  const gato     = localStorage.getItem("veo3_gato");
  const cachorro = localStorage.getItem("veo3_cachorro");
  const quem     = localStorage.getItem("veo3_quem");
  const estilo   = localStorage.getItem("veo3_estilo");
  const duracao  = localStorage.getItem("veo3_duracao");

  if (gato) {
    document.getElementById("gato").value = gato;
    document.getElementById("count-gato").textContent = `${gato.length} / 200`;
  }
  if (cachorro) {
    document.getElementById("cachorro").value = cachorro;
    document.getElementById("count-cachorro").textContent = `${cachorro.length} / 200`;
  }
  if (quem) {
    document.getElementById("quem").value = quem;
  }
  if (estilo) {
    estiloAtual = estilo;
    document.querySelectorAll("#grupo-estilo button").forEach(b => {
      b.classList.toggle("ativo", [...b.classList].includes(estilo));
    });
  }
  if (duracao) {
    duracaoAtual = parseInt(duracao, 10);
    document.querySelectorAll("#grupo-duracao button").forEach(b => {
      b.classList.toggle("ativo", b.textContent.startsWith(duracao));
    });
  }
}

restaurarStorage();

document.getElementById("quem").addEventListener("change", salvarStorage);

// --- Timestamps proporcionais à duração ---

function calcTimestamps(dur) {
  const t1 = Math.round(dur * 0.375);
  const t2 = Math.round(dur * 0.5);
  const t3 = Math.round(dur * 0.75);
  return [0, t1, t2, t3, dur];
}

// --- Geração do JSON ---

function gerar(modelo) {
  const gato     = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem     = document.getElementById("quem").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas do gato e do cachorro!");
    return;
  }

  const tom = TONS[estiloAtual];
  const [t0, t1, t2, t3, t4] = calcTimestamps(duracaoAtual);

  const seq = quem === "gato"
    ? buildSeq("cat", gato, tom.gato, "dog", cachorro, tom.cachorro, t0, t1, t2, t3, t4)
    : buildSeq("dog", cachorro, tom.cachorro, "cat", gato, tom.gato, t0, t1, t2, t3, t4);

  const json = {
    veo_model: modelo === "lite" ? "VEO_LITE" : "VEO_FAST",
    style: estiloAtual,
    scene: {
      type: "podcast_studio",
      lighting: "warm cinematic amber",
      background: "blurred dark studio bokeh",
      props: ["two microphones", "two black podcast mugs", "desk"],
      realism: "photorealistic"
    },
    camera: {
      shot: "fixed medium shot",
      cuts: false,
      zoom: false,
      pan: false,
      movement: false,
      duration_seconds: duracaoAtual
    },
    characters: [
      {
        id: "character_LEFT",
        position: "LEFT",
        species: "realistic gray cat",
        appearance: "real animal anatomy, sitting upright at desk",
        clothes: false,
        accessories: false,
        humanization: false,
        voice_id: "Rasalgethi",
        appearance_locked: true
      },
      {
        id: "character_RIGHT",
        position: "RIGHT",
        species: "realistic caramel dog",
        appearance: "real animal anatomy, sitting upright at desk",
        clothes: false,
        accessories: false,
        humanization: false,
        voice_id: "Achird",
        appearance_locked: true
      }
    ],
    rules: {
      swap_characters: false,
      swap_dialogue: false,
      swap_voices: false,
      lip_sync: "only_active_speaker",
      simultaneous_speech: false,
      add_scene_elements: false,
      modify_appearance: false,
      modify_set: false
    },
    sequence: seq
  };

  document.getElementById("saida").value = JSON.stringify(json, null, 2);
  document.getElementById("status").textContent = "JSON gerado. Pronto para copiar.";
}

function buildSeq(first, firstLine, firstTone, second, secondLine, secondTone, t0, t1, t2, t3, t4) {
  const voiceFirst  = first === "cat" ? "Rasalgethi" : "Achird";
  const voiceSecond = second === "cat" ? "Rasalgethi" : "Achird";
  const posFirst    = first === "cat" ? "LEFT" : "RIGHT";
  const posSecond   = second === "cat" ? "LEFT" : "RIGHT";
  const labelFirst  = first === "cat" ? "character_LEFT" : "character_RIGHT";
  const labelSecond = second === "cat" ? "character_LEFT" : "character_RIGHT";

  return [
    {
      timestamp: `${t0}s-${t1}s`,
      character: labelFirst,
      position: posFirst,
      voice: voiceFirst,
      action: "speaks",
      tone: firstTone,
      line: firstLine,
      lip_sync: true,
      other_character: "watches silently, no mouth movement"
    },
    {
      timestamp: `${t1}s-${t2}s`,
      character: labelSecond,
      position: posSecond,
      action: "watches_silently",
      lip_sync: false,
      expression: "listening attentive"
    },
    {
      timestamp: `${t2}s-${t3}s`,
      character: labelSecond,
      position: posSecond,
      voice: voiceSecond,
      action: "speaks",
      tone: secondTone,
      line: secondLine,
      lip_sync: true,
      other_character: "watches silently, no mouth movement"
    },
    {
      timestamp: `${t3}s-${t4}s`,
      action: "both_react_naturally",
      characters: [labelFirst, labelSecond],
      movement: "subtle natural reaction",
      lip_sync: false
    }
  ];
}

// --- Copiar ---

async function copiar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }

  try {
    await navigator.clipboard.writeText(ta.value);
  } catch {
    ta.select();
    document.execCommand("copy");
  }

  const s = document.getElementById("status");
  s.textContent = "Copiado!";
  setTimeout(() => { s.textContent = ""; }, 2000);
}

// --- Baixar JSON ---

function baixar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }

  const blob = new Blob([ta.value], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `veo3-prompt-${estiloAtual}-${duracaoAtual}s.json`;
  a.click();
  URL.revokeObjectURL(url);

  const s = document.getElementById("status");
  s.textContent = "Arquivo baixado!";
  setTimeout(() => { s.textContent = ""; }, 2000);
}

// --- Limpar ---

function limpar() {
  document.getElementById("gato").value     = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value    = "";
  document.getElementById("status").textContent      = "";
  document.getElementById("count-gato").textContent     = "0 / 200";
  document.getElementById("count-cachorro").textContent = "0 / 200";
  localStorage.removeItem("veo3_gato");
  localStorage.removeItem("veo3_cachorro");
}

</script>

</body>
</html>
