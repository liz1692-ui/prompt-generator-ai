<script>
function gerar() {
  let gato = document.getElementById("gato").value.trim();
  let cachorro = document.getElementById("cachorro").value.trim();
  let quem = document.getElementById("quem").value;
  let risada = document.getElementById("risada").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let primeira, segunda;

  if (quem === "gato") {
    primeira = `Um gato diz: "${gato}".`;
    segunda = `O cachorro responde: "${cachorro}".`;
  } else {
    primeira = `Um cachorro diz: "${cachorro}".`;
    segunda = `O gato responde: "${gato}".`;
  }

  let final = risada === "sim"
    ? "Os dois começam a rir juntos de forma descontraída."
    : "Eles ficam em silêncio por um instante, clima leve.";

  let prompt = `
Cena: podcast leve em estúdio moderno, iluminação quente.

${primeira}

${segunda}

${final}
  `;

  document.getElementById("saida").value = prompt.trim();
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>
