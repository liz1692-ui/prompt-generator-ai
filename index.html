<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador PRO VEO3</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

h2 { text-align: center; }

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.normal { background: #3b82f6; }
.engracado { background: #f59e0b; }
.treta { background: #ef4444; }
.viral { background: #8b5cf6; }

.lite { background: #22c55e; }
.fast { background: #ef4444; }
.extend { background: #06b6d4; }

textarea {
  height: 300px;
  color: #22c55e;
}
</style>
</head>

<body>

<h2>🐱🐶 Gerador PRO VEO3</h2>

<div class="box">
<select id="quem">
  <option value="gato">🐱 Gato começa</option>
  <option value="cachorro">🐶 Cachorro começa</option>
</select>

<input id="fala1" placeholder="Fala 1 (quem começa)">
<input id="fala2" placeholder="Fala 2 (resposta)">
</div>

<div class="box">
<button class="normal" onclick="setEstilo('normal')">Normal</button>
<button class="engracado" onclick="setEstilo('engracado')">Engraçado</button>
<button class="treta" onclick="setEstilo('treta')">Treta</button>
<button class="viral" onclick="setEstilo('viral')">Viral</button>
</div>

<div class="box">
<button class="lite" onclick="gerar('lite')">🟢 VEO LITE</button>
<button class="fast" onclick="gerar('fast')">🔴 VEO FAST</button>
<button class="extend" onclick="extenderCena()">🔁 Extender Cena (+8s)</button>
</div>

<textarea id="saida"></textarea>

<script>

let estiloAtual = "normal";
let currentJSON = null;

function setEstilo(estilo) {
  estiloAtual = estilo;
}

function gerar(modelo) {

  let fala1 = document.getElementById("fala1").value.trim();
  let fala2 = document.getElementById("fala2").value.trim();
  let quem = document.getElementById("quem").value;

  if (!fala1 || !fala2) {
    alert("Preencha as falas!");
    return;
  }

  let first, second;

  if (quem === "gato") {
    first = { id: "character_LEFT", voice: "Rasalgethi", line: fala1 };
    second = { id: "character_RIGHT", voice: "Achird", line: fala2 };
  } else {
    first = { id: "character_RIGHT", voice: "Achird", line: fala1 };
    second = { id: "character_LEFT", voice: "Rasalgethi", line: fala2 };
  }

  currentJSON = {
    veo_model: modelo === "lite" ? "VEO_LITE" : "VEO_FAST",
    style: estiloAtual,

    scene: {
      type: "podcast_studio"
    },

    camera: {
      duration_seconds: 8
    },

    characters: [
      { id: "character_LEFT", voice_id: "Rasalgethi" },
      { id: "character_RIGHT", voice_id: "Achird" }
    ],

    sequence: [
      {
        timestamp: "0s-3.5s",
        character: first.id,
        voice: first.voice,
        action: "speaks",
        line: first.line
      },
      {
        timestamp: "3.5s-6.5s",
        character: second.id,
        voice: second.voice,
        action: "speaks",
        line: second.line
      },
      {
        timestamp: "6.5s-8s",
        action: "both_react_naturally"
      }
    ]
  };

  render();
}

function extenderCena() {

  if (!currentJSON) {
    alert("Gere primeiro!");
    return;
  }

  let dur = currentJSON.camera.duration_seconds;
  let inicio = dur;
  let fim = dur + 8;

  let ultima = currentJSON.sequence.filter(s => s.character).slice(-1)[0];

  let proximo = ultima.character === "character_LEFT"
    ? "character_RIGHT"
    : "character_LEFT";

  let voz = proximo === "character_LEFT" ? "Rasalgethi" : "Achird";

  currentJSON.sequence.push(
    {
      timestamp: `${inicio}s-${inicio+4}s`,
      character: proximo,
      voice: voz,
      action: "speaks",
      line: "continua a conversa..."
    },
    {
      timestamp: `${inicio+4}s-${fim}s`,
      action: "both_react_naturally"
    }
  );

  currentJSON.camera.duration_seconds = fim;

  render();
}

function render() {
  document.getElementById("saida").value =
    JSON.stringify(currentJSON, null, 2);
}

</script>

</body>
</html>
