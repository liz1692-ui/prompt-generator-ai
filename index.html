<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Prompt PRO</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  margin-top: 15px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  background: #1e293b;
  color: white;
}

textarea {
  width: 100%;
  height: 320px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  padding: 15px;
  background: #020617;
  color: #22c55e;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<h2>🐱🐶 Gerador de Prompt PRO</h2>

<label>Fala do Gato:</label>
<input id="gato" placeholder="Digite a fala do gato">

<label>Fala do Cachorro:</label>
<input id="cachorro" placeholder="Digite a fala do cachorro">

<label>Quem começa:</label>
<select id="quem">
  <option value="gato">Gato</option>
  <option value="cachorro">Cachorro</option>
</select>

<button onclick="gerar('normal')">Normal</button>
<button onclick="gerar('engracado')">Engraçado</button>
<button onclick="gerar('treta')">Treta</button>
<button onclick="gerar('viral')">Viral Forte</button>

<button onclick="copiar()">Copiar Prompt</button>
<button onclick="limpar()">Limpar</button>

<textarea id="saida"></textarea>

<script>
function gerar(tipo) {

  const gato = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem = document.getElementById("quem").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let tomGato = "tom natural";
  let tomCachorro = "tom natural";

  if (tipo === "engracado") {
    tomGato = "tom debochado leve";
    tomCachorro = "tom levemente confuso";
  }

  if (tipo === "treta") {
    tomGato = "tom provocador";
    tomCachorro = "tom irritado";
  }

  if (tipo === "viral") {
    tomGato = "timing de humor estilo meme";
    tomCachorro = "resposta curta e impactante";
  }

  let sequencia = "";

  if (quem === "gato") {
    sequencia = `
[0s - 3s]
O GATO da esquerda fala (${tomGato}):
"${gato}"

[3s - 4s]
O cachorro olha para o gato, sem falar.

[4s - 6s]
O CACHORRO da direita responde (${tomCachorro}):
"${cachorro}"
`;
  } else {
    sequencia = `
[0s - 3s]
O CACHORRO da direita fala (${tomCachorro}):
"${cachorro}"

[3s - 4s]
O gato observa o cachorro.

[4s - 6s]
O GATO da esquerda responde (${tomGato}):
"${gato}"
`;
  }

  let prompt = `
Cena: podcast em estúdio moderno, iluminação quente, fundo desfocado.

CÂMERA:
Plano fixo médio.
Enquadramento travado.
Sem cortes.
Sem zoom.
Sem mudança de ângulo.

POSIÇÃO FIXA:
À esquerda: GATO CINZA realista.
À direita: CACHORRO CARAMELO realista.

APARÊNCIA (TRAVADA):
Ambos são animais reais.
Sem roupas.
Sem acessórios.
Sem humanização.
Não alterar aparência em nenhum momento.

VOZES (TRAVADAS):
Gato → voz Rasalgethi
Cachorro → voz Achird

REGRAS:
- Não inverter personagens
- Não inverter falas
- Não inverter vozes
- Quem fala move a boca
- Um fala por vez
- Não adicionar nada na cena

SEQUÊNCIA:
${sequencia}

[6s - 8s]
Ambos fazem reação leve natural mantendo aparência e vozes.
`;

  document.getElementById("saida").value = prompt.trim();
}

function copiar() {
  const texto = document.getElementById("saida");
  texto.select();
  document.execCommand("copy");
  alert("Copiado!");
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
