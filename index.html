<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gerador JSON VEO3</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 720px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 14px;
}

.box h3 {
  margin: 0 0 10px 0;
  font-size: 14px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.campo-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #94a3b8;
  margin-top: 12px;
  margin-bottom: 4px;
}

.contador {
  font-size: 11px;
  color: #475569;
  transition: color 0.2s;
}

textarea.entrada {
  width: 100%;
  height: 72px;
  border-radius: 10px;
  padding: 10px 12px;
  background: #1e293b;
  color: white;
  font-size: 14px;
  font-family: Arial;
  border: 1px solid transparent;
  resize: none;
  transition: border 0.15s;
}

textarea.entrada:focus {
  outline: none;
  border-color: #334155;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
}

.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn-group + .btn-group {
  margin-top: 8px;
}

button {
  flex: 1;
  min-width: 80px;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid transparent;
  font-weight: bold;
  cursor: pointer;
  font-size: 13px;
  transition: border 0.15s, opacity 0.15s;
  color: white;
  opacity: 0.7;
}

button.ativo {
  border: 2px solid white;
  opacity: 1;
}

button:not(.ativo):hover { opacity: 0.9; }

.normal    { background: #3b82f6; }
.engracado { background: #f59e0b; color: #000; }
.treta     { background: #ef4444; }
.viral     { background: #8b5cf6; }
.ext       { background: #0e7490; }
.btn-livre { background: #7c3aed; }
.lite      { background: #22c55e; color: #000; }
.fast      { background: #ef4444; }
.gerar-json{ background: #1d4ed8; }
.gerar-txt { background: #7c3aed; }
.copiar    { background: #1e293b; }
.download  { background: #0e7490; }
.limpar    { background: #334155; }

.custom-dur {
  display: none;
  margin-top: 10px;
  align-items: center;
  gap: 8px;
}

.custom-dur.visivel { display: flex; }

.custom-dur input[type="number"] {
  width: 90px;
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
  text-align: center;
}

.custom-dur span {
  font-size: 12px;
  color: #64748b;
}

textarea#saida {
  width: 100%;
  height: 480px;
  margin-top: 14px;
  border-radius: 10px;
  padding: 14px;
  background: #020617;
  color: #22c55e;
  font-family: monospace;
  font-size: 12px;
  border: 1px solid #1e293b;
  resize: vertical;
}

#status {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  height: 18px;
}
</style>
</head>

<body>

<h2>Gerador JSON VEO3 — Podcast</h2>

<!-- FALAS -->
<div class="box">
  <h3>Falas</h3>

  <label class="campo-label">
    Gato (voz Rasalgethi)
    <span id="count-gato" class="contador">0 / 200</span>
  </label>
  <textarea class="entrada" id="gato" maxlength="200" placeholder="Digite a fala do gato..."></textarea>

  <label class="campo-label">
    Cachorro (voz Achird)
    <span id="count-cachorro" class="contador">0 / 200</span>
  </label>
  <textarea class="entrada" id="cachorro" maxlength="200" placeholder="Digite a fala do cachorro..."></textarea>

  <select id="quem">
    <option value="gato">Gato começa</option>
    <option value="cachorro">Cachorro começa</option>
  </select>
</div>

<!-- ESTILO -->
<div class="box">
  <h3>Estilo</h3>
  <div class="btn-group" id="grupo-estilo">
    <button class="normal ativo"  onclick="setEstilo('normal',    this)">Normal</button>
    <button class="engracado"     onclick="setEstilo('engracado', this)">Engraçado</button>
    <button class="treta"         onclick="setEstilo('treta',     this)">Treta</button>
    <button class="viral"         onclick="setEstilo('viral',     this)">Viral</button>
  </div>
</div>

<!-- EXTENSÃO DE CENA -->
<div class="box">
  <h3>Extensão de Cena</h3>
  <div class="btn-group" id="grupo-extensao">
    <button class="ext ativo"  onclick="setExtensao(8,      this)">8 seg</button>
    <button class="ext"        onclick="setExtensao(16,     this)">16 seg</button>
    <button class="ext"        onclick="setExtensao(24,     this)">24 seg</button>
    <button class="btn-livre"  onclick="setExtensao('livre',this)">Livre</button>
  </div>
  <div class="custom-dur" id="custom-dur">
    <input type="number" id="custom-secs" min="8" max="120" step="8" value="32">
    <span>segundos (múltiplos de 8 recomendado)</span>
  </div>
</div>

<!-- MODELO VEO -->
<div class="box">
  <h3>Modelo VEO</h3>
  <div class="btn-group" id="grupo-modelo">
    <button class="lite ativo" onclick="setModelo('lite', this)">VEO LITE</button>
    <button class="fast"       onclick="setModelo('fast', this)">VEO FAST</button>
  </div>
</div>

<!-- AÇÕES -->
<div class="box">
  <div class="btn-group">
    <button class="gerar-json" onclick="gerar()">Gerar JSON</button>
    <button class="gerar-txt"  onclick="gerarTextoLivre()">Gerar Texto Livre</button>
  </div>
  <div class="btn-group">
    <button class="copiar"   onclick="copiar()">Copiar</button>
    <button class="download" onclick="baixar()">Baixar</button>
    <button class="limpar"   onclick="limpar()">Limpar</button>
  </div>
</div>

<textarea id="saida" readonly placeholder="O prompt aparecerá aqui..."></textarea>
<div id="status"></div>

<script>

let estiloAtual   = "normal";
let extensaoAtual = 8;
let modeloAtual   = "lite";

const TONS = {
  normal:    { gato: "calm natural",       cachorro: "calm natural"       },
  engracado: { gato: "sarcastic mocking",  cachorro: "confused amused"    },
  treta:     { gato: "provocative bold",   cachorro: "irritated tense"    },
  viral:     { gato: "meme humor absurd",  cachorro: "shocking impactful" }
};

// ── Contadores de caracteres ──────────────────────────────────────────────────

function setupContador(idCampo, idContador) {
  const campo = document.getElementById(idCampo);
  const cont  = document.getElementById(idContador);
  const max   = parseInt(campo.getAttribute("maxlength"), 10);
  campo.addEventListener("input", () => {
    const len = campo.value.length;
    cont.textContent = `${len} / ${max}`;
    cont.style.color = len > max * 0.9 ? "#f87171" : "#475569";
    salvarStorage();
  });
}

setupContador("gato",     "count-gato");
setupContador("cachorro", "count-cachorro");

// ── Estado ────────────────────────────────────────────────────────────────────

function setEstilo(estilo, btn) {
  estiloAtual = estilo;
  document.querySelectorAll("#grupo-estilo button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  salvarStorage();
}

function setExtensao(dur, btn) {
  extensaoAtual = dur;
  document.querySelectorAll("#grupo-extensao button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  document.getElementById("custom-dur").classList.toggle("visivel", dur === "livre");
  salvarStorage();
}

function setModelo(modelo, btn) {
  modeloAtual = modelo;
  document.querySelectorAll("#grupo-modelo button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  salvarStorage();
}

// ── localStorage ──────────────────────────────────────────────────────────────

function salvarStorage() {
  localStorage.setItem("veo3_gato",     document.getElementById("gato").value);
  localStorage.setItem("veo3_cachorro", document.getElementById("cachorro").value);
  localStorage.setItem("veo3_quem",     document.getElementById("quem").value);
  localStorage.setItem("veo3_estilo",   estiloAtual);
  localStorage.setItem("veo3_extensao", extensaoAtual);
  localStorage.setItem("veo3_modelo",   modeloAtual);
}

function restaurarStorage() {
  const gato     = localStorage.getItem("veo3_gato");
  const cachorro = localStorage.getItem("veo3_cachorro");
  const quem     = localStorage.getItem("veo3_quem");
  const estilo   = localStorage.getItem("veo3_estilo");
  const extensao = localStorage.getItem("veo3_extensao");
  const modelo   = localStorage.getItem("veo3_modelo");

  if (gato) {
    document.getElementById("gato").value = gato;
    document.getElementById("count-gato").textContent = `${gato.length} / 200`;
  }
  if (cachorro) {
    document.getElementById("cachorro").value = cachorro;
    document.getElementById("count-cachorro").textContent = `${cachorro.length} / 200`;
  }
  if (quem) document.getElementById("quem").value = quem;

  if (estilo) {
    estiloAtual = estilo;
    document.querySelectorAll("#grupo-estilo button").forEach(b =>
      b.classList.toggle("ativo", [...b.classList].includes(estilo))
    );
  }

  if (extensao) {
    extensaoAtual = extensao === "livre" ? "livre" : parseInt(extensao, 10);
    document.querySelectorAll("#grupo-extensao button").forEach(b => {
      const match = extensao === "livre"
        ? b.classList.contains("btn-livre")
        : b.textContent.startsWith(extensao);
      b.classList.toggle("ativo", match);
    });
    if (extensao === "livre") document.getElementById("custom-dur").classList.add("visivel");
  }

  if (modelo) {
    modeloAtual = modelo;
    document.querySelectorAll("#grupo-modelo button").forEach(b =>
      b.classList.toggle("ativo", b.classList.contains(modelo))
    );
  }
}

restaurarStorage();
document.getElementById("quem").addEventListener("change", salvarStorage);

// ── Duração total ─────────────────────────────────────────────────────────────

function getTotalSecs() {
  if (extensaoAtual === "livre") {
    return Math.max(8, parseInt(document.getElementById("custom-secs").value) || 8);
  }
  return extensaoAtual;
}

// ── Helpers de personagem ─────────────────────────────────────────────────────

function resolvePersonagens(quem) {
  const first  = quem === "gato" ? "cat" : "dog";
  const second = first === "cat" ? "dog" : "cat";
  return {
    first, second,
    voiceFirst:  first === "cat" ? "Rasalgethi" : "Achird",
    voiceSecond: second === "cat" ? "Rasalgethi" : "Achird",
    posFirst:    first === "cat" ? "LEFT"  : "RIGHT",
    posSecond:   second === "cat" ? "LEFT" : "RIGHT",
    labelFirst:  first === "cat" ? "character_LEFT"  : "character_RIGHT",
    labelSecond: second === "cat" ? "character_LEFT" : "character_RIGHT"
  };
}

// ── Gerar JSON ────────────────────────────────────────────────────────────────

function gerar() {
  const gatoVal     = document.getElementById("gato").value.trim();
  const cachorroVal = document.getElementById("cachorro").value.trim();
  const quem        = document.getElementById("quem").value;

  if (!gatoVal || !cachorroVal) { alert("Preencha as falas do gato e do cachorro!"); return; }

  const tom       = TONS[estiloAtual];
  const totalSecs = getTotalSecs();
  const numBlocks = Math.max(1, Math.ceil(totalSecs / 8));
  const p         = resolvePersonagens(quem);

  const firstLine  = quem === "gato" ? gatoVal     : cachorroVal;
  const secondLine = quem === "gato" ? cachorroVal : gatoVal;
  const firstTone  = quem === "gato" ? tom.gato    : tom.cachorro;
  const secondTone = quem === "gato" ? tom.cachorro : tom.gato;

  // Bloco 1: diálogo principal — sequência contínua, sem bloco de "assistindo"
  const block1Seq = [
    {
      timestamp: "0s-3.5s",
      character: p.labelFirst,
      position: p.posFirst,
      voice: p.voiceFirst,
      action: "speaks",
      tone: firstTone,
      line: firstLine,
      lip_sync: true,
      other_character: "watches silently, no mouth movement"
    },
    {
      timestamp: "3.5s-7s",
      character: p.labelSecond,
      position: p.posSecond,
      voice: p.voiceSecond,
      action: "speaks",
      tone: secondTone,
      line: secondLine,
      lip_sync: true,
      other_character: "watches silently, no mouth movement"
    },
    {
      timestamp: "7s-8s",
      action: "both_react_naturally",
      characters: [p.labelFirst, p.labelSecond],
      movement: "subtle natural reaction",
      lip_sync: false
    }
  ];

  const blocks = [{ block: 1, timestamp: "0s-8s", sequence: block1Seq }];

  // Blocos extras: extensão contínua
  for (let i = 2; i <= numBlocks; i++) {
    const s = (i - 1) * 8;
    const e = i * 8;
    blocks.push({
      block: i,
      timestamp: `${s}s-${e}s`,
      continuity: "seamless_extension",
      sequence: [
        {
          timestamp: `${s}s-${e}s`,
          action: "extend_scene_naturally",
          characters: [p.labelFirst, p.labelSecond],
          instruction: "continue dialogue naturally from previous block — same scene, same characters, no reset, maintain lip-sync rules"
        }
      ]
    });
  }

  const json = {
    veo_model: modeloAtual === "lite" ? "VEO_LITE" : "VEO_FAST",
    style: estiloAtual,
    total_duration_seconds: totalSecs,
    total_blocks: numBlocks,
    scene: {
      type: "podcast_studio",
      lighting: "warm cinematic amber",
      background: "blurred dark studio bokeh",
      props: ["two microphones", "two black podcast mugs", "desk"],
      realism: "photorealistic"
    },
    camera: {
      shot: "fixed medium shot",
      cuts: false,
      zoom: false,
      pan: false,
      movement: false
    },
    characters: [
      {
        id: "character_LEFT",
        position: "LEFT",
        species: "realistic gray cat",
        appearance: "real animal anatomy, sitting upright at desk",
        clothes: false,
        accessories: false,
        humanization: false,
        voice_id: "Rasalgethi",
        appearance_locked: true
      },
      {
        id: "character_RIGHT",
        position: "RIGHT",
        species: "realistic caramel dog",
        appearance: "real animal anatomy, sitting upright at desk",
        clothes: false,
        accessories: false,
        humanization: false,
        voice_id: "Achird",
        appearance_locked: true
      }
    ],
    dialogue_control: {
      first_speaker: p.labelFirst,
      strict_order: true,
      enforce_timeline: true,
      interruptions: false
    },
    rules: {
      swap_characters: false,
      swap_dialogue: false,
      swap_voices: false,
      lip_sync: "only_active_speaker",
      simultaneous_speech: false,
      add_scene_elements: false,
      modify_appearance: false,
      modify_set: false
    },
    continuity_rules: {
      scene_continuity: true,
      character_memory: true,
      voice_consistency: true,
      no_reset_between_blocks: true
    },
    blocks: blocks
  };

  document.getElementById("saida").value = JSON.stringify(json, null, 2);
  document.getElementById("status").textContent =
    `JSON gerado — ${numBlocks} bloco(s) × 8s = ${totalSecs}s total.`;
}

// ── Gerar Texto Livre ─────────────────────────────────────────────────────────

function gerarTextoLivre() {
  const gatoVal     = document.getElementById("gato").value.trim();
  const cachorroVal = document.getElementById("cachorro").value.trim();
  const quem        = document.getElementById("quem").value;

  if (!gatoVal || !cachorroVal) { alert("Preencha as falas do gato e do cachorro!"); return; }

  const tom       = TONS[estiloAtual];
  const totalSecs = getTotalSecs();
  const numBlocks = Math.max(1, Math.ceil(totalSecs / 8));
  const p         = resolvePersonagens(quem);

  const nomePrimeiro  = quem === "gato" ? "Gato (Rasalgethi, esquerda)" : "Cachorro (Achird, direita)";
  const nomeSegundo   = quem === "gato" ? "Cachorro (Achird, direita)"  : "Gato (Rasalgethi, esquerda)";
  const primeiraFala  = quem === "gato" ? gatoVal     : cachorroVal;
  const segundaFala   = quem === "gato" ? cachorroVal : gatoVal;
  const primeiroTom   = quem === "gato" ? tom.gato    : tom.cachorro;
  const segundoTom    = quem === "gato" ? tom.cachorro : tom.gato;
  const estiloLabel   = { normal: "Normal", engracado: "Engraçado", treta: "Treta", viral: "Viral" }[estiloAtual];

  let blocosExtra = "";
  if (numBlocks > 1) {
    const linhas = [];
    for (let i = 2; i <= numBlocks; i++) {
      const s = (i - 1) * 8, e = i * 8;
      linhas.push(`  Bloco ${i} [${s}s–${e}s]: continue naturalmente — mesma cena, mesmos personagens, sem reiniciar.`);
    }
    blocosExtra = "\n\nBLOCOS DE EXTENSÃO:\n" + linhas.join("\n");
  }

  const texto =
`Crie um vídeo de podcast fotorrealista com duração total de ${totalSecs} segundos.

CENÁRIO: Estúdio de podcast. Iluminação âmbar cinematográfica. Fundo escuro desfocado (bokeh). Mesa com dois microfones e duas canecas pretas de podcast.

PERSONAGENS:
- À esquerda: gato cinza fotorrealista. Anatomia animal real, sentado ereto. Voz: Rasalgethi.
- À direita: cachorro caramelo fotorrealista. Anatomia animal real, sentado ereto. Voz: Achird.

CÂMERA: Plano médio fixo. Sem cortes, zoom ou movimentos de câmera. Realismo fotográfico.

ESTILO: ${estiloLabel}

DIÁLOGO — Bloco 1 [0s–8s]:
[0s–3.5s]  ${nomePrimeiro} fala (${primeiroTom}):
           "${primeiraFala}"

[3.5s–7s]  ${nomeSegundo} responde (${segundoTom}):
           "${segundaFala}"

[7s–8s]    Ambos reagem naturalmente. Sem fala. Lip-sync desativado.${blocosExtra}

CONTROLE DE DIÁLOGO:
- Primeiro a falar: ${p.labelFirst}. Ordem estrita, sem interrupções.
- Lip-sync ativado apenas para quem está falando. O outro mantém boca fechada.

REGRAS OBRIGATÓRIAS:
- Gato sempre usa voz Rasalgethi. Cachorro sempre usa voz Achird.
- Sem inversão de personagens, vozes ou posições.
- Aparência travada: gato sempre cinza, cachorro sempre caramelo.
- Sem elementos extras ou modificações de cena.
- Continuidade perfeita entre blocos: mesma cena, sem reset.`;

  document.getElementById("saida").value = texto;
  document.getElementById("status").textContent =
    `Texto livre gerado — ${numBlocks} bloco(s) × 8s = ${totalSecs}s total.`;
}

// ── Copiar ────────────────────────────────────────────────────────────────────

async function copiar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }
  try {
    await navigator.clipboard.writeText(ta.value);
  } catch {
    ta.select();
    document.execCommand("copy");
  }
  const s = document.getElementById("status");
  s.textContent = "Copiado!";
  setTimeout(() => { s.textContent = ""; }, 2000);
}

// ── Baixar ────────────────────────────────────────────────────────────────────

function baixar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }

  const isJson = ta.value.trimStart().startsWith("{");
  const ext    = isJson ? "json" : "txt";
  const type   = isJson ? "application/json" : "text/plain";
  const nome   = `veo3-${estiloAtual}-${getTotalSecs()}s.${ext}`;

  const blob = new Blob([ta.value], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = nome; a.click();
  URL.revokeObjectURL(url);

  const s = document.getElementById("status");
  s.textContent = `Arquivo "${nome}" baixado!`;
  setTimeout(() => { s.textContent = ""; }, 2500);
}

// ── Limpar ────────────────────────────────────────────────────────────────────

function limpar() {
  document.getElementById("gato").value     = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value    = "";
  document.getElementById("status").textContent        = "";
  document.getElementById("count-gato").textContent     = "0 / 200";
  document.getElementById("count-cachorro").textContent = "0 / 200";
  localStorage.removeItem("veo3_gato");
  localStorage.removeItem("veo3_cachorro");
}

</script>

</body>
</html>
