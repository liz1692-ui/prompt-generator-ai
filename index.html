<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador PRO Completo</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

h2 {
  text-align: center;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.lite { background: #22c55e; }
.fast { background: #ef4444; }

.normal { background: #3b82f6; }
.engracado { background: #f59e0b; }
.treta { background: #ef4444; }
.viral { background: #8b5cf6; }

textarea {
  width: 100%;
  height: 300px;
  margin-top: 20px;
  border-radius: 10px;
  padding: 15px;
  background: #020617;
  color: #22c55e;
}
</style>
</head>

<body>

<h2>🐱🐶 Gerador PRO COMPLETO</h2>

<div class="box">
<input id="gato" placeholder="Fala do gato">
<input id="cachorro" placeholder="Fala do cachorro">

<select id="quem">
  <option value="gato">Gato começa</option>
  <option value="cachorro">Cachorro começa</option>
</select>
</div>

<div class="box">
<h3>🎭 Estilo</h3>

<button class="normal" onclick="setEstilo('normal')">Normal</button>
<button class="engracado" onclick="setEstilo('engracado')">Engraçado</button>
<button class="treta" onclick="setEstilo('treta')">Treta</button>
<button class="viral" onclick="setEstilo('viral')">Viral</button>
</div>

<div class="box">
<h3>⚙️ Modelo VEO</h3>

<button class="lite" onclick="gerar('lite')">🟢 VEO LITE</button>
<button class="fast" onclick="gerar('fast')">🔴 VEO FAST</button>
</div>

<div class="box">
<button onclick="copiar()">Copiar</button>
<button onclick="limpar()">Limpar</button>
</div>

<textarea id="saida"></textarea>

<script>

let estiloAtual = "normal";

function setEstilo(estilo) {
  estiloAtual = estilo;
}

function gerar(modelo) {

  let gato = document.getElementById("gato").value.trim();
  let cachorro = document.getElementById("cachorro").value.trim();
  let quem = document.getElementById("quem").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let tomGato = "tom natural";
  let tomCachorro = "tom natural";

  if (estiloAtual === "engracado") {
    tomGato = "tom debochado";
    tomCachorro = "tom confuso";
  }

  if (estiloAtual === "treta") {
    tomGato = "tom provocador";
    tomCachorro = "tom irritado";
  }

  if (estiloAtual === "viral") {
    tomGato = "humor estilo meme";
    tomCachorro = "resposta impactante";
  }

  let seq = "";

  if (quem === "gato") {
    seq = `
GATO (${tomGato}):
"${gato}"

CACHORRO (${tomCachorro}):
"${cachorro}"
`;
  } else {
    seq = `
CACHORRO (${tomCachorro}):
"${cachorro}"

GATO (${tomGato}):
"${gato}"
`;
  }

  let prompt = "";

  if (modelo === "lite") {
    prompt = `
Cena: podcast estático.

À esquerda gato cinza.
À direita cachorro caramelo.

Sem roupas.

${seq}

Reação leve.
`;
  }

  if (modelo === "fast") {
    prompt = `
Cena rápida dinâmica.

${seq}
`;
  }

  document.getElementById("saida").value = prompt.trim();
}

function copiar() {
  let texto = document.getElementById("saida");
  texto.select();
  document.execCommand("copy");
  alert("Copiado!");
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}

</script>

</body>
</html>
