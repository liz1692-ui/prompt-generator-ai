<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Prompt PRO</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 720px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 14px;
}

.box h3 {
  margin: 0 0 10px 0;
  font-size: 14px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
}

input:first-child { margin-top: 0; }

.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  flex: 1;
  min-width: 100px;
  padding: 12px;
  margin-top: 0;
  border-radius: 10px;
  border: 2px solid transparent;
  font-weight: bold;
  cursor: pointer;
  font-size: 13px;
  transition: border 0.15s, opacity 0.15s;
  color: white;
  opacity: 0.7;
}

button.ativo {
  border: 2px solid white;
  opacity: 1;
}

button:not(.ativo):hover { opacity: 0.9; }

.normal   { background: #3b82f6; }
.engracado{ background: #f59e0b; color: #000; }
.treta    { background: #ef4444; }
.viral    { background: #8b5cf6; }
.lite     { background: #22c55e; color: #000; }
.fast     { background: #ef4444; }
.copiar   { background: #1e293b; }
.limpar   { background: #334155; }
.continuar{ background: #8b5cf6; }
.upload   { background: #0ea5e9; }

.img-status {
  font-size: 12px;
  color: #60a5fa;
  margin-top: 8px;
  min-height: 16px;
}

.toggle-box {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  width: 100%;
}

.toggle-box input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #8b5cf6;
  cursor: pointer;
  flex-shrink: 0;
  margin: 0;
}

.toggle-box span {
  font-size: 13px;
  font-weight: bold;
  color: #c4b5fd;
}

textarea {
  width: 100%;
  height: 480px;
  margin-top: 14px;
  border-radius: 10px;
  padding: 14px;
  background: #020617;
  color: #22c55e;
  font-family: monospace;
  font-size: 12px;
  border: 1px solid #1e293b;
  resize: vertical;
}

#status {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  height: 18px;
}
</style>
</head>

<body>

<h2>Gerador JSON VEO3 — Podcast</h2>

<div class="box">
  <h3>Falas</h3>
  <input id="gato"     placeholder="Fala do gato (voz Rasalgethi)">
  <input id="cachorro" placeholder="Fala do cachorro (voz Achird)">
  <select id="quem" style="margin-top:8px">
    <option value="gato">Gato começa</option>
    <option value="cachorro">Cachorro começa</option>
  </select>
</div>

<div class="box">
  <h3>Estilo</h3>
  <div class="btn-group">
    <button class="normal ativo"    onclick="setEstilo('normal',    this)">Normal</button>
    <button class="engracado"       onclick="setEstilo('engracado', this)">Engraçado</button>
    <button class="treta"           onclick="setEstilo('treta',     this)">Treta</button>
    <button class="viral"           onclick="setEstilo('viral',     this)">Viral</button>
  </div>
</div>

<div class="box">
  <h3>Modelo VEO</h3>
  <div class="btn-group">
    <button class="lite" onclick="gerar('lite')">VEO LITE</button>
    <button class="fast" onclick="gerar('fast')">VEO FAST</button>
  </div>
</div>

<div class="box">
  <label class="toggle-box" for="continuarCena">
    <input type="checkbox" id="continuarCena">
    <span>Continuar cena automaticamente (+8s)</span>
  </label>
  <div class="btn-group" style="margin-top:10px">
    <button class="continuar" onclick="gerarComContinuacao()">🟣 Gerar com continuação</button>
  </div>
</div>

<div class="box">
  <h3>🖼️ Imagem Base</h3>
  <label class="toggle-box" for="useImageBase">
    <input type="checkbox" id="useImageBase">
    <span>Usar imagem como base da cena</span>
  </label>
  <div id="imagePanel" style="display:none; margin-top:10px">
    <div id="imgbbConfig" style="padding:10px; background:#1e293b; border-radius:8px; font-size:12px; color:#94a3b8; margin-bottom:8px">
      🔑 imgbb API Key — <a href="https://imgbb.com/api" target="_blank" style="color:#60a5fa">usar a sua key</a> (opcional)<br>
      <input type="text" id="imgbbKey" placeholder="Deixe vazio para usar key padrão" style="margin-top:6px; font-size:12px">
    </div>
    <div class="btn-group">
      <button class="upload" onclick="document.getElementById('fileInput').click()">📁 Selecionar imagem</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
    <div class="img-status" id="imgStatus"></div>
    <img id="imgPreview" src="" alt="" style="display:none; width:100%; margin-top:10px; border-radius:8px; max-height:200px; object-fit:cover">
    <input type="text" id="imageUrl" placeholder="URL gerada automaticamente" style="margin-top:8px; opacity:0.7" readonly>
    <select id="posEsquerda" style="margin-top:8px">
      <option value="cat">🐱 Gato está à esquerda</option>
      <option value="dog">🐶 Cachorro está à esquerda</option>
    </select>
  </div>
</div>

<div class="box">
  <label class="toggle-box" for="strictDialogueMode">
    <input type="checkbox" id="strictDialogueMode" checked>
    <span>🔒 Modo de Diálogo Estrito</span>
  </label>
</div>

<div class="box">
  <div class="btn-group">
    <button class="copiar" onclick="copiar()">Copiar JSON</button>
    <button class="limpar" onclick="limpar()">Limpar</button>
  </div>
</div>

<textarea id="saida" readonly placeholder="O prompt JSON aparecerá aqui..."></textarea>
<div id="status"></div>

<script>

let estiloAtual = "normal";

const TONS = {
  normal:    { gato: "calm natural",       cachorro: "calm natural"     },
  engracado: { gato: "sarcastic mocking",  cachorro: "confused amused"  },
  treta:     { gato: "provocative bold",   cachorro: "irritated tense"  },
  viral:     { gato: "meme humor absurd",  cachorro: "shocking impactful"}
};

function setEstilo(estilo, btn) {
  estiloAtual = estilo;
  document.querySelectorAll(".btn-group button").forEach(b => {
    if (b.classList.contains("normal") || b.classList.contains("engracado") ||
        b.classList.contains("treta")  || b.classList.contains("viral")) {
      b.classList.remove("ativo");
    }
  });
  btn.classList.add("ativo");
}

function buildSceneBase(modelo, imageMode, imageUrl) {

  const posEsq = imageMode
    ? (document.getElementById("posEsquerda").value)
    : "cat";
  const posDir = posEsq === "cat" ? "dog" : "cat";
  const voiceMap = { cat: "Rasalgethi", dog: "Achird" };

  const characters = [
    { id: posEsq, position: "LEFT",  instruction: "USE CHARACTER EXACTLY AS IN INPUT IMAGE", voice_id: voiceMap[posEsq] },
    { id: posDir, position: "RIGHT", instruction: "USE CHARACTER EXACTLY AS IN INPUT IMAGE", voice_id: voiceMap[posDir] }
  ];

  const frameBlock = imageUrl
    ? { type: "image", url: imageUrl, role: "FIRST_FRAME", priority: "absolute", instruction: "THIS IMAGE DEFINES CHARACTER IDENTITY. DO NOT CHANGE ANY CHARACTER" }
    : { type: "image", role: "FIRST_FRAME", priority: "absolute", instruction: "THIS IMAGE DEFINES CHARACTER IDENTITY. DO NOT CHANGE ANY CHARACTER" };

  const json = {
    veo_model: modelo === "lite" ? "VEO_LITE" : "VEO_FAST",
    style: estiloAtual,
    render_mode: "animate_from_image",
    input_frame: frameBlock,
    scene: {
      source: "input_frame",
      preserve_composition: true
    },
    environment: {
      background: "blurred dark studio bokeh",
      rule: "REPLACE BACKGROUND ONLY, KEEP ALL SUBJECTS FROM INPUT IMAGE UNCHANGED"
    },
    camera: {
      shot: "fixed medium shot",
      cuts: false,
      zoom: false,
      pan: false,
      movement: false
    },
    characters,
    rules: {
      STRICT_SPEAKER_MODE: true,
      ONLY_ONE_SPEAKER_PER_BLOCK: true,
      LOCK_VOICE_TO_CHARACTER: true,
      FORCE_LIP_SYNC: true
    }
  };

  if (imageMode && imageUrl) {
    json.generation_rules = {
      mode: "image_to_video",
      character_policy: "preserve_from_input",
      allow_new_characters: false,
      allow_face_change: false,
      allow_body_change: false,
      allow_reinterpretation: false,
      priority: "image_over_prompt"
    };
  }

  return json;
}

function gerar(modelo) {

  const gato     = cleanText(document.getElementById("gato").value.trim());
  const cachorro = cleanText(document.getElementById("cachorro").value.trim());
  const quem     = document.getElementById("quem").value;
  const continuar = document.getElementById("continuarCena").checked;
  const strict    = document.getElementById("strictDialogueMode").checked;
  const imageMode = document.getElementById("useImageBase").checked;
  const imageUrl  = getImageUrl();

  if (!gato || !cachorro) {
    alert("Preencha as falas do gato e do cachorro!");
    return;
  }

  if (imageMode) {
    if (!imageUrl) { alert("Cole a URL da imagem."); return; }
    if (!validateImageUrl(imageUrl)) return;
  }

  const tom = TONS[estiloAtual];

  const buildAndValidate = (first, fl, ft, second, sl, st, offset) => {
    const raw = buildSeq(first, fl, ft, second, sl, st, offset);
    return strict ? validateSeq(raw) : raw;
  };

  const [first, fl, ft, second, sl, st] = quem === "gato"
    ? ["cat", gato, tom.gato, "dog", cachorro, tom.cachorro]
    : ["dog", cachorro, tom.cachorro, "cat", gato, tom.gato];

  const seq1 = buildAndValidate(first, fl, ft, second, sl, st, 0);

  const base = buildSceneBase(modelo, imageMode, imageUrl);
  const rules = strict
    ? { ...base.rules, ...strictRules() }
    : base.rules;

  let json;

  const speakerPriority = {
    first_speaker: first,
    enforce_order: true
  };

  if (!continuar) {
    json = {
      ...base,
      camera: { ...base.camera, duration_seconds: 8 },
      rules,
      speaker_priority: speakerPriority,
      sequence: seq1
    };
  } else {
    const seq2 = buildAndValidate(first, fl, ft, second, sl, st, 8);

    json = {
      ...base,
      camera: { ...base.camera, duration_seconds: 16 },
      rules,
      speaker_priority: speakerPriority,
      continuation_rules: {
        no_restart: true,
        same_characters: true,
        same_set: true,
        same_camera: true,
        action_evolves: true
      },
      scenes: [
        {
          scene_id: "S1",
          time_range: "0s-8s",
          duration: "8s",
          description: "início da conversa",
          sequence: seq1
        },
        {
          scene_id: "S2",
          time_range: "8s-16s",
          duration: "8s",
          description: "continuação direta da cena anterior — sem corte, sem reinício",
          continuation: true,
          sequence: seq2
        }
      ]
    };
  }

  document.getElementById("saida").value = JSON.stringify(json, null, 2);
  const durMsg = continuar ? "16s — 2 cenas" : "8s";
  const strictMsg = strict ? " | 🔒 Modo Estrito ativo" : "";
  document.getElementById("status").textContent = `JSON gerado (${durMsg}).${strictMsg}`;
}

function gerarComContinuacao() {
  document.getElementById("continuarCena").checked = true;
  const modelo = "lite";
  gerar(modelo);
}

document.getElementById("useImageBase").addEventListener("change", function() {
  document.getElementById("imagePanel").style.display = this.checked ? "block" : "none";
});

async function uploadImage(file) {
  const key = document.getElementById("imgbbKey").value.trim() || "6d207e02198a847aa98d0a2a901485a5";

  const formData = new FormData();
  formData.append("image", file);

  const res = await fetch("https://api.imgbb.com/1/upload?key=" + key, {
    method: "POST",
    body: formData
  });

  if (!res.ok) throw new Error("Upload falhou: " + res.status);
  const data = await res.json();
  return data.data.url;
}

async function handleImageUpload(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const status   = document.getElementById("imgStatus");
  const urlField = document.getElementById("imageUrl");
  const preview  = document.getElementById("imgPreview");

  preview.style.display = "none";
  urlField.value = "";
  status.style.color = "#f59e0b";
  status.textContent = "⏳ Fazendo upload...";

  try {
    const url = await uploadImage(file);
    if (url) {
      urlField.value = url;
      preview.src = url;
      preview.style.display = "block";
      status.textContent = "✅ " + file.name + " — pronto!";
      status.style.color = "#22c55e";
    } else {
      const localUrl = URL.createObjectURL(file);
      preview.src = localUrl;
      preview.style.display = "block";
      status.textContent = "⚠️ Sem API key — cole sua chave imgbb para gerar URL pública.";
      status.style.color = "#f59e0b";
    }
  } catch (e) {
    status.textContent = "❌ " + e.message;
    status.style.color = "#ef4444";
  }
}

function getImageUrl() {
  return document.getElementById("imageUrl").value.trim() || null;
}

function cleanText(text) {
  return text
    .replace(/\.\.\./g, "")
    .replace(/([!?;:]){2,}/g, "$1")
    .replace(/["""'']/g, "")
    .replace(/\s+/g, " ")
    .trim()
    .split(" ").slice(0, 10).join(" ");
}

function validateImageUrl(url) {
  if (url.includes("[") || url.includes("]")) {
    alert("URL inválida: contém [ ] — cole uma URL real.");
    return false;
  }
  if (!url.startsWith("http")) {
    alert("URL inválida: deve começar com http ou https.");
    return false;
  }
  return true;
}

const VOICE_MAP = { cat: "Rasalgethi", dog: "Achird" };

const FACIAL = {
  normal: {
    speak_first:  "confident natural expression",
    speak_second: "engaged nodding",
    pause:        "curious attentive tilt",
    final_action: "both_smile_naturally",
    final_expr:   "warm natural smile",
    final_mouth:  "closed relaxed smile"
  },
  engracado: {
    speak_first:  "smirk, barely holding laugh",
    speak_second: "confused blinking",
    pause:        "holding back laughter",
    final_action: "both_laugh",
    final_expr:   "laughing",
    final_mouth:  "wide open",
    final_sound:  "HA HA HA"
  },
  treta: {
    speak_first:  "provocative intense stare",
    speak_second: "irritated tense glare",
    pause:        "tense silence, narrowed eyes",
    final_action: "both_stare_intensely",
    final_expr:   "intense confrontational stare",
    final_mouth:  "tight lipped tense"
  },
  viral: {
    speak_first:  "excited wide eyes, dramatic",
    speak_second: "shocked disbelief expression",
    pause:        "dramatic pause, eyes wide",
    final_action: "both_react_wildly",
    final_expr:   "shocked excited expression",
    final_mouth:  "wide open gasp"
  }
};

function buildSeq(first, firstLine, firstTone, second, secondLine, secondTone, offset) {

  const o = offset || 0;
  const f = FACIAL[estiloAtual] || FACIAL.normal;

  const finalBlock = {
    timestamp: `${o+6}s-${o+8}s`,
    speaker: null,
    action: f.final_action,
    characters: [first, second],
    facial_expression: f.final_expr,
    mouth_movement: f.final_mouth,
    lip_sync: false
  };
  if (f.final_sound) finalBlock.sound = f.final_sound;
  if (f.final_audio) finalBlock.audio_priority = f.final_audio;

  return [
    {
      timestamp: `${o}s-${o+3}s`,
      speaker: first,
      voice: VOICE_MAP[first],
      action: "speaks",
      tone: firstTone,
      line: firstLine,
      lip_sync: true,
      mouth_movement: "clear speaking motion",
      facial_expression: f.speak_first,
      listeners: [second],
      listeners_action: "silent, no mouth movement"
    },
    {
      timestamp: `${o+3}s-${o+4}s`,
      speaker: null,
      action: "pause_reaction",
      characters: [first, second],
      facial_expression: f.pause,
      lip_sync: false
    },
    {
      timestamp: `${o+4}s-${o+6}s`,
      speaker: second,
      voice: VOICE_MAP[second],
      action: "speaks",
      tone: secondTone,
      line: secondLine,
      lip_sync: true,
      mouth_movement: "clear speaking motion",
      facial_expression: f.speak_second,
      listeners: [first],
      listeners_action: "silent, no mouth movement"
    },
    finalBlock
  ];
}

function validateSeq(blocks) {
  return blocks.map(b => {
    const fixed = { ...b };

    // speaker=null mas tem line → remover line
    if (fixed.speaker === null && fixed.line) {
      delete fixed.line;
    }

    // speaker definido sem voice → adicionar
    if (fixed.speaker && !fixed.voice) {
      fixed.voice = VOICE_MAP[fixed.speaker];
    }

    // speaker definido mas lip_sync != true → corrigir
    if (fixed.speaker && fixed.lip_sync !== true) {
      fixed.lip_sync = true;
    }

    // speaker definido sem listeners → adicionar
    if (fixed.speaker && (!fixed.listeners || fixed.listeners.length === 0)) {
      const all = ["cat", "dog"];
      fixed.listeners = all.filter(c => c !== fixed.speaker);
      fixed.listeners_action = "silent, no mouth movement";
    }

    return fixed;
  });
}

function strictRules() {
  return {
    STRICT_SPEAKER_MODE: true,
    ONLY_ONE_SPEAKER_PER_BLOCK: true,
    LOCK_VOICE_TO_CHARACTER: true,
    FORCE_LIP_SYNC: true
  };
}

function copiar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }
  ta.select();
  document.execCommand("copy");
  const s = document.getElementById("status");
  s.textContent = "Copiado!";
  setTimeout(() => { s.textContent = ""; }, 2000);
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
  document.getElementById("status").textContent = "";
  document.getElementById("continuarCena").checked = false;
  document.getElementById("useImageBase").checked = false;
  document.getElementById("imagePanel").style.display = "none";
  document.getElementById("imageUrl").value = "";
  document.getElementById("fileInput").value = "";
  document.getElementById("imgStatus").textContent = "";
  const p = document.getElementById("imgPreview");
  p.src = ""; p.style.display = "none";
}

(function init() {
  const key = localStorage.getItem("veo_imgbbKey");
  if (key) document.getElementById("imgbbKey").value = key;
  document.getElementById("imgbbKey").addEventListener("input", function() {
    localStorage.setItem("veo_imgbbKey", this.value.trim());
  });
})();

</script>

</body>
</html>
