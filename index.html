<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Prompt PRO</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  margin-top: 15px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  background: #1e293b;
  color: white;
}

textarea {
  width: 100%;
  height: 320px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  padding: 15px;
  background: #020617;
  color: #22c55e;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<h2>🐱🐶 Gerador de Prompt PRO</h2>

<label>Fala do Gato:</label>
<input id="gato" placeholder="Digite a fala do gato">

<label>Fala do Cachorro:</label>
<input id="cachorro" placeholder="Digite a fala do cachorro">

<label>Quem começa:</label>
<select id="quem">
  <option value="gato">Gato</option>
  <option value="cachorro">Cachorro</option>
</select>

<!-- BOTÕES CORRETOS -->
<button onclick="gerar('lite')">🟢 VEO LITE (estável)</button>
<button onclick="gerar('fast')">🔴 VEO FAST (rápido)</button>

<button onclick="copiar()">Copiar Prompt</button>
<button onclick="limpar()">Limpar</button>

<textarea id="saida"></textarea>

<script>
function gerar(modelo) {

  const gato = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem = document.getElementById("quem").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let sequencia = "";

  if (quem === "gato") {
    sequencia = `
[0s - 3s]
O GATO da esquerda fala:
"${gato}"

[3s - 4s]
O cachorro observa o gato.

[4s - 6s]
O CACHORRO da direita responde:
"${cachorro}"
`;
  } else {
    sequencia = `
[0s - 3s]
O CACHORRO da direita fala:
"${cachorro}"

[3s - 4s]
O gato observa o cachorro.

[4s - 6s]
O GATO da esquerda responde:
"${gato}"
`;
  }

  let prompt = "";

  // 🟢 LITE (ESTÁVEL)
  if (modelo === "lite") {
    prompt = `
Cena: podcast em estúdio moderno, iluminação quente, fundo desfocado.

CÂMERA:
Plano fixo médio.
Sem cortes.
Sem zoom.

POSIÇÃO FIXA:
À esquerda: GATO CINZA realista.
À direita: CACHORRO CARAMELO realista.

APARÊNCIA:
Sem roupas.
Sem acessórios.
Sem humanização.

VOZES:
Gato → Rasalgethi
Cachorro → Achird

REGRAS:
- Não inverter personagens
- Não inverter falas
- Quem fala move a boca
- Um fala por vez

SEQUÊNCIA:
${sequencia}

[6s - 8s]
Ambos reagem naturalmente.
`;
  }

  // 🔴 FAST (RÁPIDO)
  if (modelo === "fast") {
    prompt = `
Cena dinâmica de podcast.

Gato fala:
"${gato}"

Cachorro responde:
"${cachorro}"

Reação leve no final.
`;
  }

  document.getElementById("saida").value = prompt.trim();
}

function copiar() {
  const texto = document.getElementById("saida");
  texto.select();
  document.execCommand("copy");
  alert("Copiado!");
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
