<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Prompt PRO</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, select, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    textarea {
      height: 260px;
      background: #1e293b;
      color: #22c55e;
    }
  </style>
</head>
<body>

<h2>🐱🐶 Gerador de Prompt PRO</h2>

<label>Fala do Gato:</label>
<input id="gato">

<label>Fala do Cachorro:</label>
<input id="cachorro">

<label>Quem começa:</label>
<select id="quem">
  <option value="gato">Gato</option>
  <option value="cachorro">Cachorro</option>
</select>

<label>Tem gargalhada?</label>
<select id="risada">
  <option value="sim">Sim</option>
  <option value="nao">Não</option>
</select>

<button onclick="gerar()">Gerar Prompt</button>
<button onclick="copiar()">Copiar Prompt</button>
<button onclick="limpar()">Limpar</button>

<textarea id="saida"></textarea>

<script>
function gerar() {
  const gato = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem = document.getElementById("quem").value;
  const risada = document.getElementById("risada").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let prompt = `
Cena: podcast leve em estúdio moderno, iluminação quente.

Enquadramento fixo:

À esquerda:
Um gato cinza, claramente identificado como o gato.

À direita:
Um cachorro caramelo, claramente identificado como o cachorro.

Regra obrigatória:
O gato NUNCA pode falar como cachorro.
O cachorro NUNCA pode falar como gato.
Cada personagem fala apenas na sua vez.

Sequência com tempo:
`;

  if (quem === "gato") {
    prompt += `
[0s - 3s]
O gato da esquerda abre a boca e fala:
"${gato}"

[3s - 4s]
O cachorro da direita olha para o gato e reage imediatamente.

[4s - 6s]
O cachorro da direita abre a boca e responde sem hesitar:
"${cachorro}"
`;
  } else {
    prompt += `
[0s - 3s]
O cachorro da direita abre a boca e fala:
"${cachorro}"

[3s - 4s]
O gato da esquerda olha para o cachorro e reage imediatamente.

[4s - 6s]
O gato da esquerda abre a boca e responde sem hesitar:
"${gato}"
`;
  }

  prompt += `
[6s - 8s]
${
  risada === "sim"
    ? "Ambos riem juntos de forma natural e descontraída."
    : "Eles se encaram por um instante, clima leve."
}
`;

  document.getElementById("saida").value = prompt.trim();
}

function copiar() {
  const texto = document.getElementById("saida");
  texto.select();
  document.execCommand("copy");
  alert("Prompt copiado!");
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
