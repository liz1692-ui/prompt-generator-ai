<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gerador JSON VEO3</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 720px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 14px;
}

.box h3 {
  margin: 0 0 10px 0;
  font-size: 14px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.campo-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: #94a3b8;
  margin-top: 12px;
  margin-bottom: 4px;
}

.contador {
  font-size: 11px;
  color: #475569;
  transition: color 0.2s;
}

textarea.entrada {
  width: 100%;
  height: 72px;
  border-radius: 10px;
  padding: 10px 12px;
  background: #1e293b;
  color: white;
  font-size: 14px;
  font-family: Arial;
  border: 1px solid transparent;
  resize: none;
  transition: border 0.15s;
}

textarea.entrada:focus {
  outline: none;
  border-color: #334155;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
}

.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.btn-group + .btn-group {
  margin-top: 8px;
}

button {
  flex: 1;
  min-width: 80px;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid transparent;
  font-weight: bold;
  cursor: pointer;
  font-size: 13px;
  transition: border 0.15s, opacity 0.15s;
  color: white;
  opacity: 0.7;
}

button.ativo {
  border: 2px solid white;
  opacity: 1;
}

button:not(.ativo):hover { opacity: 0.9; }

.normal    { background: #3b82f6; }
.engracado { background: #f59e0b; color: #000; }
.treta     { background: #ef4444; }
.viral     { background: #8b5cf6; }
.ext       { background: #0e7490; }
.btn-livre { background: #7c3aed; }
.lite      { background: #22c55e; color: #000; }
.fast      { background: #ef4444; }
.gerar-json{ background: #1d4ed8; }
.gerar-txt { background: #7c3aed; }
.extender  { background: #059669; opacity: 1; border: 2px solid #34d399; }
.extender:hover { opacity: 0.9; }
.quem-btn  { background: #1e3a5f; }
.copiar    { background: #1e293b; }
.download  { background: #0e7490; }
.limpar    { background: #334155; }

.custom-dur {
  display: none;
  margin-top: 10px;
  align-items: center;
  gap: 8px;
}

.custom-dur.visivel { display: flex; }

.custom-dur input[type="number"] {
  width: 90px;
  padding: 10px 12px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
  text-align: center;
}

.custom-dur span {
  font-size: 12px;
  color: #64748b;
}

.box-ext {
  border: 1px solid #064e3b;
}

.badge-dur {
  font-size: 11px;
  background: #064e3b;
  color: #34d399;
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 8px;
  font-weight: normal;
  text-transform: none;
  letter-spacing: 0;
}

textarea#saida {
  width: 100%;
  height: 480px;
  margin-top: 14px;
  border-radius: 10px;
  padding: 14px;
  background: #020617;
  color: #22c55e;
  font-family: monospace;
  font-size: 12px;
  border: 1px solid #1e293b;
  resize: vertical;
}

#status {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  height: 18px;
}
</style>
</head>

<body>

<h2>Gerador JSON VEO3 — Podcast</h2>

<!-- FALAS -->
<div class="box">
  <h3>Quem começa falando?</h3>
  <div class="btn-group" id="grupo-quem">
    <button class="quem-btn ativo" onclick="setQuem('gato', this)">Gato (LEFT)</button>
    <button class="quem-btn"       onclick="setQuem('cachorro', this)">Cachorro (RIGHT)</button>
  </div>

  <label class="campo-label">
    🎙️ Fala 1
    <span id="count-fala1" class="contador">0 / 200</span>
  </label>
  <textarea class="entrada" id="fala1" maxlength="200" placeholder="Fala 1..."></textarea>

  <label class="campo-label">
    🎙️ Fala 2
    <span id="count-fala2" class="contador">0 / 200</span>
  </label>
  <textarea class="entrada" id="fala2" maxlength="200" placeholder="Fala 2..."></textarea>
</div>

<!-- ESTILO -->
<div class="box">
  <h3>Estilo</h3>
  <div class="btn-group" id="grupo-estilo">
    <button class="normal ativo"  onclick="setEstilo('normal',    this)">Normal</button>
    <button class="engracado"     onclick="setEstilo('engracado', this)">Engraçado</button>
    <button class="treta"         onclick="setEstilo('treta',     this)">Treta</button>
    <button class="viral"         onclick="setEstilo('viral',     this)">Viral</button>
  </div>
</div>

<!-- DURAÇÃO INICIAL -->
<div class="box">
  <h3>Duração Inicial</h3>
  <div class="btn-group" id="grupo-extensao">
    <button class="ext ativo"  onclick="setExtensao(8,      this)">8 seg</button>
    <button class="ext"        onclick="setExtensao(16,     this)">16 seg</button>
    <button class="ext"        onclick="setExtensao(24,     this)">24 seg</button>
    <button class="btn-livre"  onclick="setExtensao('livre',this)">Livre</button>
  </div>
  <div class="custom-dur" id="custom-dur">
    <input type="number" id="custom-secs" min="8" max="120" step="8" value="32">
    <span>segundos (múltiplos de 8 recomendado)</span>
  </div>
</div>

<!-- MODELO VEO -->
<div class="box">
  <h3>Modelo VEO</h3>
  <div class="btn-group" id="grupo-modelo">
    <button class="lite ativo" onclick="setModelo('lite', this)">VEO LITE</button>
    <button class="fast"       onclick="setModelo('fast', this)">VEO FAST</button>
  </div>
</div>

<!-- AÇÕES PRINCIPAIS -->
<div class="box">
  <div class="btn-group">
    <button class="gerar-json" onclick="gerar()">Gerar JSON</button>
    <button class="gerar-txt"  onclick="gerarTextoLivre()">Gerar Texto Livre</button>
  </div>
  <div class="btn-group">
    <button class="copiar"   onclick="copiar()">Copiar</button>
    <button class="download" onclick="baixar()">Baixar</button>
    <button class="limpar"   onclick="limpar()">Limpar</button>
  </div>
</div>

<!-- EXTENDER CENA (aparece após gerar) -->
<div class="box box-ext" id="secao-ext" style="display:none">
  <h3>Extender Cena <span id="badge-dur" class="badge-dur"></span></h3>
  <label class="campo-label">
    <span id="ext-speaker-label">Próxima fala</span>
    <span id="count-ext" class="contador">0 / 200</span>
  </label>
  <textarea class="entrada" id="ext-linha" maxlength="200" placeholder="Digite a próxima fala..."></textarea>
  <div class="btn-group" style="margin-top:10px">
    <button class="extender" onclick="extenderCena()">🔁 Extender Cena (+8s)</button>
  </div>
</div>

<textarea id="saida" readonly placeholder="O prompt aparecerá aqui..."></textarea>
<div id="status"></div>

<script>

let estiloAtual   = "normal";
let extensaoAtual = 8;
let modeloAtual   = "lite";
let quemComeca    = "gato";

// ── Memória do sistema ────────────────────────────────────────────────────────
let currentJSON   = null;
let ultimoSpeaker = null;

const TONS = {
  normal:    { gato: "calm natural",       cachorro: "calm natural"       },
  engracado: { gato: "sarcastic mocking",  cachorro: "confused amused"    },
  treta:     { gato: "provocative bold",   cachorro: "irritated tense"    },
  viral:     { gato: "meme humor absurd",  cachorro: "shocking impactful" }
};

// ── Contadores de caracteres ──────────────────────────────────────────────────

function setupContador(idCampo, idContador) {
  const campo = document.getElementById(idCampo);
  const cont  = document.getElementById(idContador);
  const max   = parseInt(campo.getAttribute("maxlength"), 10);
  campo.addEventListener("input", () => {
    const len = campo.value.length;
    cont.textContent = `${len} / ${max}`;
    cont.style.color = len > max * 0.9 ? "#f87171" : "#475569";
    salvarStorage();
  });
}

setupContador("fala1", "count-fala1");
setupContador("fala2", "count-fala2");

document.getElementById("ext-linha").addEventListener("input", () => {
  const len = document.getElementById("ext-linha").value.length;
  document.getElementById("count-ext").textContent = `${len} / 200`;
  document.getElementById("count-ext").style.color = len > 180 ? "#f87171" : "#475569";
});

// ── Estado ────────────────────────────────────────────────────────────────────

function setQuem(quem, btn) {
  quemComeca = quem;
  document.querySelectorAll("#grupo-quem button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  salvarStorage();
}

function setEstilo(estilo, btn) {
  estiloAtual = estilo;
  document.querySelectorAll("#grupo-estilo button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  salvarStorage();
}

function setExtensao(dur, btn) {
  extensaoAtual = dur;
  document.querySelectorAll("#grupo-extensao button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  document.getElementById("custom-dur").classList.toggle("visivel", dur === "livre");
  salvarStorage();
}

function setModelo(modelo, btn) {
  modeloAtual = modelo;
  document.querySelectorAll("#grupo-modelo button").forEach(b => b.classList.remove("ativo"));
  btn.classList.add("ativo");
  salvarStorage();
}

// ── localStorage ──────────────────────────────────────────────────────────────

function salvarStorage() {
  localStorage.setItem("veo3_fala1",   document.getElementById("fala1").value);
  localStorage.setItem("veo3_fala2",   document.getElementById("fala2").value);
  localStorage.setItem("veo3_quem",    quemComeca);
  localStorage.setItem("veo3_estilo",  estiloAtual);
  localStorage.setItem("veo3_extensao",extensaoAtual);
  localStorage.setItem("veo3_modelo",  modeloAtual);
}

function restaurarStorage() {
  const fala1   = localStorage.getItem("veo3_fala1");
  const fala2   = localStorage.getItem("veo3_fala2");
  const quem    = localStorage.getItem("veo3_quem");
  const estilo  = localStorage.getItem("veo3_estilo");
  const extensao= localStorage.getItem("veo3_extensao");
  const modelo  = localStorage.getItem("veo3_modelo");

  if (fala1) {
    document.getElementById("fala1").value = fala1;
    document.getElementById("count-fala1").textContent = `${fala1.length} / 200`;
  }
  if (fala2) {
    document.getElementById("fala2").value = fala2;
    document.getElementById("count-fala2").textContent = `${fala2.length} / 200`;
  }
  if (quem) {
    quemComeca = quem;
    document.querySelectorAll("#grupo-quem button").forEach(b =>
      b.classList.toggle("ativo", b.textContent.toLowerCase().startsWith(quem))
    );
  }
  if (estilo) {
    estiloAtual = estilo;
    document.querySelectorAll("#grupo-estilo button").forEach(b =>
      b.classList.toggle("ativo", [...b.classList].includes(estilo))
    );
  }
  if (extensao) {
    extensaoAtual = extensao === "livre" ? "livre" : parseInt(extensao, 10);
    document.querySelectorAll("#grupo-extensao button").forEach(b => {
      const match = extensao === "livre"
        ? b.classList.contains("btn-livre")
        : b.textContent.startsWith(extensao);
      b.classList.toggle("ativo", match);
    });
    if (extensao === "livre") document.getElementById("custom-dur").classList.add("visivel");
  }
  if (modelo) {
    modeloAtual = modelo;
    document.querySelectorAll("#grupo-modelo button").forEach(b =>
      b.classList.toggle("ativo", b.classList.contains(modelo))
    );
  }
}

restaurarStorage();

// ── Helpers ───────────────────────────────────────────────────────────────────

function getTotalSecs() {
  if (extensaoAtual === "livre") {
    return Math.max(8, parseInt(document.getElementById("custom-secs").value) || 8);
  }
  return extensaoAtual;
}

function resolvePersonagens(quem) {
  const isCat = quem === "gato";
  return {
    labelFirst:  isCat ? "character_LEFT"  : "character_RIGHT",
    labelSecond: isCat ? "character_RIGHT" : "character_LEFT",
    voiceFirst:  isCat ? "Rasalgethi" : "Achird",
    voiceSecond: isCat ? "Achird" : "Rasalgethi",
    posFirst:    isCat ? "LEFT"  : "RIGHT",
    posSecond:   isCat ? "RIGHT" : "LEFT"
  };
}

function speakerOposto(label) {
  return label === "character_LEFT" ? "character_RIGHT" : "character_LEFT";
}

function speakerVoz(label) {
  return label === "character_LEFT" ? "Rasalgethi" : "Achird";
}

function speakerPos(label) {
  return label === "character_LEFT" ? "LEFT" : "RIGHT";
}

function speakerTom(label) {
  const tom = TONS[estiloAtual];
  return label === "character_LEFT" ? tom.gato : tom.cachorro;
}

function speakerNome(label) {
  return label === "character_LEFT"
    ? "Gato — Rasalgethi (esquerda)"
    : "Cachorro — Achird (direita)";
}

// ── Painel de extensão ────────────────────────────────────────────────────────

function atualizarPainelExtensao() {
  const dur  = currentJSON.camera.duration_seconds;
  const next = speakerOposto(ultimoSpeaker);
  document.getElementById("badge-dur").textContent         = `${dur}s → ${dur + 8}s`;
  document.getElementById("ext-speaker-label").textContent = `Próxima fala: ${speakerNome(next)}`;
  document.getElementById("ext-linha").value               = "";
  document.getElementById("count-ext").textContent         = "0 / 200";
  document.getElementById("secao-ext").style.display       = "block";
}

// ── Gerar JSON ────────────────────────────────────────────────────────────────

function gerar() {
  const fala1Val = document.getElementById("fala1").value.trim();
  const fala2Val = document.getElementById("fala2").value.trim();

  if (!fala1Val || !fala2Val) { alert("Preencha as duas falas!"); return; }

  const gatoVal     = quemComeca === "gato" ? fala1Val : fala2Val;
  const cachorroVal = quemComeca === "gato" ? fala2Val : fala1Val;

  const tom        = TONS[estiloAtual];
  const totalSecs  = getTotalSecs();
  const p          = resolvePersonagens(quemComeca);
  const firstLine  = fala1Val;
  const secondLine = fala2Val;
  const firstTone  = quemComeca === "gato" ? tom.gato    : tom.cachorro;
  const secondTone = quemComeca === "gato" ? tom.cachorro : tom.gato;

  // Bloco inicial (0s-8s) — sequência contínua
  const sequence = [
    {
      timestamp: "0s-3.5s",
      character: p.labelFirst,
      position:  p.posFirst,
      voice:     p.voiceFirst,
      action:    "speaks",
      tone:      firstTone,
      line:      firstLine,
      lip_sync:  true,
      other_character: "watches silently, no mouth movement"
    },
    {
      timestamp: "3.5s-6.5s",
      character: p.labelSecond,
      position:  p.posSecond,
      voice:     p.voiceSecond,
      action:    "speaks",
      tone:      secondTone,
      line:      secondLine,
      lip_sync:  true,
      other_character: "watches silently, no mouth movement"
    },
    {
      timestamp: "6.5s-8s",
      action:    "both_react_naturally",
      characters: [p.labelFirst, p.labelSecond],
      movement:  "subtle natural reaction",
      lip_sync:  false
    }
  ];

  // Se duração inicial > 8s, adicionar blocos de extensão natural
  for (let s = 8; s < totalSecs; s += 8) {
    const e = s + 8;
    sequence.push({
      timestamp:   `${s}s-${e}s`,
      action:      "extend_scene_naturally",
      characters:  [p.labelFirst, p.labelSecond],
      instruction: "continue dialogue naturally — same scene, same characters, same voices, no reset"
    });
  }

  currentJSON = {
    veo_model: modeloAtual === "lite" ? "VEO_LITE" : "VEO_FAST",
    style:     estiloAtual,
    scene: {
      type:       "podcast_studio",
      lighting:   "warm cinematic amber",
      background: "blurred dark studio bokeh",
      props:      ["two microphones", "two black podcast mugs", "desk"],
      realism:    "photorealistic"
    },
    camera: {
      shot:             "fixed medium shot",
      cuts:             false,
      zoom:             false,
      pan:              false,
      movement:         false,
      duration_seconds: totalSecs
    },
    characters: [
      {
        id:               "character_LEFT",
        position:         "LEFT",
        species:          "realistic gray cat",
        appearance:       "real animal anatomy, sitting upright at desk",
        clothes:          false,
        accessories:      false,
        humanization:     false,
        voice_id:         "Rasalgethi",
        appearance_locked: true
      },
      {
        id:               "character_RIGHT",
        position:         "RIGHT",
        species:          "realistic caramel dog",
        appearance:       "real animal anatomy, sitting upright at desk",
        clothes:          false,
        accessories:      false,
        humanization:     false,
        voice_id:         "Achird",
        appearance_locked: true
      }
    ],
    dialogue_control: {
      first_speaker:    p.labelFirst,
      strict_order:     true,
      enforce_timeline: true,
      interruptions:    false
    },
    rules: {
      swap_characters:     false,
      swap_dialogue:       false,
      swap_voices:         false,
      lip_sync:            "only_active_speaker",
      simultaneous_speech: false,
      add_scene_elements:  false,
      modify_appearance:   false,
      modify_set:          false
    },
    continuity_rules: {
      scene_continuity:         true,
      character_memory:         true,
      voice_consistency:        true,
      no_reset_between_blocks:  true
    },
    sequence: sequence
  };

  ultimoSpeaker = p.labelSecond;

  renderizar();
  atualizarPainelExtensao();
  document.getElementById("status").textContent =
    `JSON gerado — ${totalSecs}s. Use "Extender Cena" para continuar.`;
}

// ── Extender Cena (+8s) ───────────────────────────────────────────────────────

function extenderCena() {
  if (!currentJSON) { alert("Gere o prompt primeiro!"); return; }

  const novaFala = document.getElementById("ext-linha").value.trim();
  if (!novaFala) { alert("Digite a próxima fala!"); return; }

  const dur    = currentJSON.camera.duration_seconds;
  const inicio = dur;
  const fim    = dur + 8;
  const mid    = inicio + 4;

  const proxSpeaker = speakerOposto(ultimoSpeaker);

  // Adicionar nova fala
  currentJSON.sequence.push({
    timestamp:       `${inicio}s-${mid}s`,
    character:       proxSpeaker,
    position:        speakerPos(proxSpeaker),
    voice:           speakerVoz(proxSpeaker),
    action:          "speaks",
    tone:            speakerTom(proxSpeaker),
    line:            novaFala,
    lip_sync:        true,
    other_character: "watches silently, no mouth movement"
  });

  // Adicionar reação
  currentJSON.sequence.push({
    timestamp:  `${mid}s-${fim}s`,
    action:     "both_react_naturally",
    characters: ["character_LEFT", "character_RIGHT"],
    movement:   "subtle natural reaction",
    lip_sync:   false
  });

  // Atualizar duração
  currentJSON.camera.duration_seconds = fim;
  ultimoSpeaker = proxSpeaker;

  renderizar();
  atualizarPainelExtensao();

  const blocos = Math.round(fim / 8);
  document.getElementById("status").textContent =
    `Cena extendida! Total: ${fim}s (${blocos} blocos de 8s)`;
}

function renderizar() {
  document.getElementById("saida").value = JSON.stringify(currentJSON, null, 2);
}

// ── Gerar Texto Livre ─────────────────────────────────────────────────────────

function gerarTextoLivre() {
  const fala1Val = document.getElementById("fala1").value.trim();
  const fala2Val = document.getElementById("fala2").value.trim();

  if (!fala1Val || !fala2Val) { alert("Preencha as duas falas!"); return; }

  const tom          = TONS[estiloAtual];
  const p            = resolvePersonagens(quemComeca);
  const nomePrimeiro = quemComeca === "gato" ? "Gato (Rasalgethi, esquerda)" : "Cachorro (Achird, direita)";
  const nomeSegundo  = quemComeca === "gato" ? "Cachorro (Achird, direita)"  : "Gato (Rasalgethi, esquerda)";
  const primeiraFala = fala1Val;
  const segundaFala  = fala2Val;
  const primeiroTom  = quemComeca === "gato" ? tom.gato    : tom.cachorro;
  const segundoTom   = quemComeca === "gato" ? tom.cachorro : tom.gato;
  const estiloLabel  = { normal: "Normal", engracado: "Engraçado", treta: "Treta", viral: "Viral" }[estiloAtual];

  const texto =
`Crie um vídeo de podcast fotorrealista com duração de 8 segundos.

CENÁRIO: Estúdio de podcast. Iluminação âmbar cinematográfica. Fundo escuro desfocado. Mesa com dois microfones e duas canecas pretas.

PERSONAGENS:
- À esquerda: gato cinza fotorrealista. Anatomia animal real, sentado ereto. Voz: Rasalgethi.
- À direita: cachorro caramelo fotorrealista. Anatomia animal real, sentado ereto. Voz: Achird.

CÂMERA: Plano médio fixo. Sem cortes, zoom ou movimentos. Realismo fotográfico.

ESTILO: ${estiloLabel}

DIÁLOGO:
[0s–3.5s]   ${nomePrimeiro} fala (${primeiroTom}):
            "${primeiraFala}"

[3.5s–6.5s] ${nomeSegundo} responde (${segundoTom}):
            "${segundaFala}"

[6.5s–8s]   Ambos reagem naturalmente. Lip-sync desativado.

CONTROLE: Primeiro a falar: ${p.labelFirst}. Ordem estrita, sem interrupções.

REGRAS: Lip-sync apenas no personagem ativo. Sem inversão de vozes ou personagens. Aparência travada.`;

  document.getElementById("saida").value = texto;
  document.getElementById("status").textContent = "Texto livre gerado.";
}

// ── Copiar ────────────────────────────────────────────────────────────────────

async function copiar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }
  try {
    await navigator.clipboard.writeText(ta.value);
  } catch {
    ta.select();
    document.execCommand("copy");
  }
  const s = document.getElementById("status");
  s.textContent = "Copiado!";
  setTimeout(() => { s.textContent = ""; }, 2000);
}

// ── Baixar ────────────────────────────────────────────────────────────────────

function baixar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }

  const isJson = ta.value.trimStart().startsWith("{");
  const ext    = isJson ? "json" : "txt";
  const type   = isJson ? "application/json" : "text/plain";
  const dur    = currentJSON ? currentJSON.camera.duration_seconds : getTotalSecs();
  const nome   = `veo3-${estiloAtual}-${dur}s.${ext}`;

  const blob = new Blob([ta.value], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = nome; a.click();
  URL.revokeObjectURL(url);

  const s = document.getElementById("status");
  s.textContent = `"${nome}" baixado!`;
  setTimeout(() => { s.textContent = ""; }, 2500);
}

// ── Limpar ────────────────────────────────────────────────────────────────────

function limpar() {
  document.getElementById("fala1").value              = "";
  document.getElementById("fala2").value              = "";
  document.getElementById("saida").value              = "";
  document.getElementById("ext-linha").value          = "";
  document.getElementById("status").textContent       = "";
  document.getElementById("count-fala1").textContent  = "0 / 200";
  document.getElementById("count-fala2").textContent  = "0 / 200";
  document.getElementById("count-ext").textContent    = "0 / 200";
  document.getElementById("secao-ext").style.display  = "none";
  currentJSON   = null;
  ultimoSpeaker = null;
  localStorage.removeItem("veo3_fala1");
  localStorage.removeItem("veo3_fala2");
}

</script>
