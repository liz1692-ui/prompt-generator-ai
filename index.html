<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Prompt PRO</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, select, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    textarea {
      height: 260px;
      background: #1e293b;
      color: #22c55e;
    }
  </style>
</head>
<body>

<h2>🐱🐶 Gerador de Prompt PRO</h2>

<label>Fala do Gato:</label>
<input id="gato">

<label>Fala do Cachorro:</label>
<input id="cachorro">

<label>Quem começa:</label>
<select id="quem">
  <option value="gato">Gato</option>
  <option value="cachorro">Cachorro</option>
</select>

<button onclick="gerar('normal')">Normal</button>
<button onclick="gerar('engracado')">Engraçado</button>
<button onclick="gerar('treta')">Treta</button>
<button onclick="gerar('viral')">Viral Forte</button>

<button onclick="copiar()">Copiar Prompt</button>
<button onclick="limpar()">Limpar</button>

<textarea id="saida"></textarea>

<script>
function gerar(tipo) {
  const gato = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem = document.getElementById("quem").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let estilo = "";
  if (tipo === "normal") estilo = "tom natural";
  if (tipo === "engracado") estilo = "tom debochado e irônico";
  if (tipo === "treta") estilo = "tom provocador";
  if (tipo === "viral") estilo = "timing de humor estilo meme";

  let prompt = `
Cena: podcast leve em estúdio moderno, iluminação quente.

PERSONAGENS FIXOS (NUNCA MUDAR):

ESQUERDA:
GATO CINZA.
Animal realista.
Sem roupa.
Sem acessórios.
Sem humanização.
Não adicionar nenhum item ao corpo.
Este personagem é SEMPRE o GATO.
Ele usa SEMPRE a voz Rasalgethi.

DIREITA:
CACHORRO CARAMELO.
Animal realista.
Sem roupa.
Sem acessórios.
Sem humanização.
Não adicionar nenhum item ao corpo.
Este personagem é SEMPRE o CACHORRO.
Ele usa SEMPRE a voz Achird.

REGRAS ABSOLUTAS:
- Nenhum personagem pode usar roupa
- Nenhum personagem pode usar acessórios
- Não modificar aparência
- Não transformar em humano
- Não adicionar elementos extras

- Não inverter falas
- Não inverter personagens
- Não inverter vozes
- A voz pertence ao personagem
- Quem fala é quem move a boca

SEQUÊNCIA:
`;

  if (quem === "gato") {
    prompt += `
[0s - 3s]
MOSTRAR CLARAMENTE:
O GATO da ESQUERDA falando com voz Rasalgethi (${estilo}):

"${gato}"

[3s - 4s]
O cachorro observa.

[4s - 6s]
MOSTRAR CLARAMENTE:
O CACHORRO da DIREITA falando com voz Achird:

"${cachorro}"
`;
  } else {
    prompt += `
[0s - 3s]
MOSTRAR CLARAMENTE:
O CACHORRO da DIREITA falando com voz Achird (${estilo}):

"${cachorro}"

[3s - 4s]
O gato observa.

[4s - 6s]
MOSTRAR CLARAMENTE:
O GATO da ESQUERDA falando com voz Rasalgethi:

"${gato}"
`;
  }

  prompt += `
[6s - 8s]
Ambos reagem naturalmente, mantendo aparência original.
`;

  document.getElementById("saida").value = prompt.trim();
}

function copiar() {
  const texto = document.getElementById("saida");
  texto.select();
  document.execCommand("copy");
  alert("Prompt copiado!");
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
