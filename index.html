<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Prompt PRO</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 720px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 14px;
}

.box h3 {
  margin: 0 0 10px 0;
  font-size: 14px;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
}

input:first-child { margin-top: 0; }

.btn-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  flex: 1;
  min-width: 100px;
  padding: 12px;
  margin-top: 0;
  border-radius: 10px;
  border: 2px solid transparent;
  font-weight: bold;
  cursor: pointer;
  font-size: 13px;
  transition: border 0.15s, opacity 0.15s;
  color: white;
  opacity: 0.7;
}

button.ativo {
  border: 2px solid white;
  opacity: 1;
}

button:not(.ativo):hover { opacity: 0.9; }

.normal   { background: #3b82f6; }
.engracado{ background: #f59e0b; color: #000; }
.treta    { background: #ef4444; }
.viral    { background: #8b5cf6; }
.lite     { background: #22c55e; color: #000; }
.fast     { background: #ef4444; }
.copiar   { background: #1e293b; }
.limpar   { background: #334155; }
.continuar{ background: #8b5cf6; }

.toggle-box {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  width: 100%;
}

.toggle-box input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #8b5cf6;
  cursor: pointer;
  flex-shrink: 0;
  margin: 0;
}

.toggle-box span {
  font-size: 13px;
  font-weight: bold;
  color: #c4b5fd;
}

textarea {
  width: 100%;
  height: 480px;
  margin-top: 14px;
  border-radius: 10px;
  padding: 14px;
  background: #020617;
  color: #22c55e;
  font-family: monospace;
  font-size: 12px;
  border: 1px solid #1e293b;
  resize: vertical;
}

#status {
  text-align: center;
  font-size: 12px;
  color: #64748b;
  margin-top: 6px;
  height: 18px;
}
</style>
</head>

<body>

<h2>Gerador JSON VEO3 — Podcast</h2>

<div class="box">
  <h3>Falas</h3>
  <input id="gato"     placeholder="Fala do gato (voz Rasalgethi)">
  <input id="cachorro" placeholder="Fala do cachorro (voz Achird)">
  <select id="quem" style="margin-top:8px">
    <option value="gato">Gato começa</option>
    <option value="cachorro">Cachorro começa</option>
  </select>
</div>

<div class="box">
  <h3>Estilo</h3>
  <div class="btn-group">
    <button class="normal ativo"    onclick="setEstilo('normal',    this)">Normal</button>
    <button class="engracado"       onclick="setEstilo('engracado', this)">Engraçado</button>
    <button class="treta"           onclick="setEstilo('treta',     this)">Treta</button>
    <button class="viral"           onclick="setEstilo('viral',     this)">Viral</button>
  </div>
</div>

<div class="box">
  <h3>Modelo VEO</h3>
  <div class="btn-group">
    <button class="lite" onclick="gerar('lite')">VEO LITE</button>
    <button class="fast" onclick="gerar('fast')">VEO FAST</button>
  </div>
</div>

<div class="box">
  <label class="toggle-box" for="continuarCena">
    <input type="checkbox" id="continuarCena">
    <span>Continuar cena automaticamente (+8s)</span>
  </label>
  <div class="btn-group" style="margin-top:10px">
    <button class="continuar" onclick="gerarComContinuacao()">🟣 Gerar com continuação</button>
  </div>
</div>

<div class="box">
  <label class="toggle-box" for="strictDialogueMode">
    <input type="checkbox" id="strictDialogueMode" checked>
    <span>🔒 Modo de Diálogo Estrito</span>
  </label>
</div>

<div class="box">
  <div class="btn-group">
    <button class="copiar" onclick="copiar()">Copiar JSON</button>
    <button class="limpar" onclick="limpar()">Limpar</button>
  </div>
</div>

<textarea id="saida" readonly placeholder="O prompt JSON aparecerá aqui..."></textarea>
<div id="status"></div>

<script>

let estiloAtual = "normal";

const TONS = {
  normal:    { gato: "calm natural",       cachorro: "calm natural"     },
  engracado: { gato: "sarcastic mocking",  cachorro: "confused amused"  },
  treta:     { gato: "provocative bold",   cachorro: "irritated tense"  },
  viral:     { gato: "meme humor absurd",  cachorro: "shocking impactful"}
};

function setEstilo(estilo, btn) {
  estiloAtual = estilo;
  document.querySelectorAll(".btn-group button").forEach(b => {
    if (b.classList.contains("normal") || b.classList.contains("engracado") ||
        b.classList.contains("treta")  || b.classList.contains("viral")) {
      b.classList.remove("ativo");
    }
  });
  btn.classList.add("ativo");
}

function buildSceneBase(modelo) {
  return {
    veo_model: modelo === "lite" ? "VEO_LITE" : "VEO_FAST",
    style: estiloAtual,
    scene: {
      type: "podcast_studio",
      lighting: "warm cinematic amber",
      background: "blurred dark studio bokeh",
      props: ["two microphones", "two black podcast mugs", "desk"],
      realism: "photorealistic"
    },
    camera: {
      shot: "fixed medium shot",
      cuts: false,
      zoom: false,
      pan: false,
      movement: false
    },
    characters: [
      {
        id: "character_LEFT",
        position: "LEFT",
        species: "realistic gray cat",
        appearance: "real animal anatomy, sitting upright at desk",
        clothes: false,
        accessories: false,
        humanization: false,
        voice_id: "Rasalgethi",
        appearance_locked: true
      },
      {
        id: "character_RIGHT",
        position: "RIGHT",
        species: "realistic caramel dog",
        appearance: "real animal anatomy, sitting upright at desk",
        clothes: false,
        accessories: false,
        humanization: false,
        voice_id: "Achird",
        appearance_locked: true
      }
    ],
    rules: {
      swap_characters: false,
      swap_dialogue: false,
      swap_voices: false,
      lip_sync: "only_active_speaker",
      simultaneous_speech: false,
      add_scene_elements: false,
      modify_appearance: false,
      modify_set: false
    }
  };
}

function gerar(modelo) {

  const gato     = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem     = document.getElementById("quem").value;
  const continuar = document.getElementById("continuarCena").checked;
  const strict    = document.getElementById("strictDialogueMode").checked;

  if (!gato || !cachorro) {
    alert("Preencha as falas do gato e do cachorro!");
    return;
  }

  const tom = TONS[estiloAtual];

  const buildAndValidate = (first, fl, ft, second, sl, st, offset) => {
    const raw = buildSeq(first, fl, ft, second, sl, st, offset);
    return strict ? validateSeq(raw) : raw;
  };

  const [first, fl, ft, second, sl, st] = quem === "gato"
    ? ["cat", gato, tom.gato, "dog", cachorro, tom.cachorro]
    : ["dog", cachorro, tom.cachorro, "cat", gato, tom.gato];

  const seq1 = buildAndValidate(first, fl, ft, second, sl, st, 0);

  const base = buildSceneBase(modelo);
  const rules = strict
    ? { ...base.rules, ...strictRules() }
    : base.rules;

  let json;

  if (!continuar) {
    json = {
      ...base,
      camera: { ...base.camera, duration_seconds: 8 },
      rules,
      sequence: seq1
    };
  } else {
    const seq2 = buildAndValidate(first, fl, ft, second, sl, st, 8);

    json = {
      ...base,
      camera: { ...base.camera, duration_seconds: 16 },
      rules,
      continuation_rules: {
        no_restart: true,
        same_characters: true,
        same_set: true,
        same_camera: true,
        action_evolves: true
      },
      scenes: [
        {
          scene_id: "S1",
          time_range: "0s-8s",
          duration: "8s",
          description: "início da conversa",
          sequence: seq1
        },
        {
          scene_id: "S2",
          time_range: "8s-16s",
          duration: "8s",
          description: "continuação direta da cena anterior — sem corte, sem reinício",
          continuation: true,
          sequence: seq2
        }
      ]
    };
  }

  document.getElementById("saida").value = JSON.stringify(json, null, 2);
  const durMsg = continuar ? "16s — 2 cenas" : "8s";
  const strictMsg = strict ? " | 🔒 Modo Estrito ativo" : "";
  document.getElementById("status").textContent = `JSON gerado (${durMsg}).${strictMsg}`;
}

function gerarComContinuacao() {
  document.getElementById("continuarCena").checked = true;
  const modelo = "lite";
  gerar(modelo);
}

const VOICE_MAP = { cat: "Rasalgethi", dog: "Achird" };

function buildSeq(first, firstLine, firstTone, second, secondLine, secondTone, offset) {

  const o = offset || 0;

  return [
    {
      timestamp: `${o}s-${o+3}s`,
      speaker: first,
      voice: VOICE_MAP[first],
      action: "speaks",
      tone: firstTone,
      line: firstLine,
      lip_sync: true,
      listeners: [second],
      listeners_action: "silent, no mouth movement"
    },
    {
      timestamp: `${o+3}s-${o+4}s`,
      speaker: null,
      action: "pause_reaction",
      characters: [first, second],
      lip_sync: false
    },
    {
      timestamp: `${o+4}s-${o+6}s`,
      speaker: second,
      voice: VOICE_MAP[second],
      action: "speaks",
      tone: secondTone,
      line: secondLine,
      lip_sync: true,
      listeners: [first],
      listeners_action: "silent, no mouth movement"
    },
    {
      timestamp: `${o+6}s-${o+8}s`,
      speaker: null,
      action: "both_react_naturally",
      characters: [first, second],
      lip_sync: false
    }
  ];
}

function validateSeq(blocks) {
  return blocks.map(b => {
    const fixed = { ...b };

    // speaker=null mas tem line → remover line
    if (fixed.speaker === null && fixed.line) {
      delete fixed.line;
    }

    // speaker definido sem voice → adicionar
    if (fixed.speaker && !fixed.voice) {
      fixed.voice = VOICE_MAP[fixed.speaker];
    }

    // speaker definido mas lip_sync != true → corrigir
    if (fixed.speaker && fixed.lip_sync !== true) {
      fixed.lip_sync = true;
    }

    // speaker definido sem listeners → adicionar
    if (fixed.speaker && (!fixed.listeners || fixed.listeners.length === 0)) {
      const all = ["cat", "dog"];
      fixed.listeners = all.filter(c => c !== fixed.speaker);
      fixed.listeners_action = "silent, no mouth movement";
    }

    return fixed;
  });
}

function strictRules() {
  return {
    STRICT_SPEAKER_MODE: true,
    ONLY_ONE_SPEAKER_PER_BLOCK: true,
    IGNORE_NON_SPEAKER_AUDIO: true,
    LOCK_VOICE_TO_CHARACTER: true,
    NO_DIALOGUE_SWAP: true,
    NO_VOICE_SWAP: true,
    NO_ACTION_CONFUSION: true
  };
}

function copiar() {
  const ta = document.getElementById("saida");
  if (!ta.value) { alert("Gere o prompt primeiro!"); return; }
  ta.select();
  document.execCommand("copy");
  const s = document.getElementById("status");
  s.textContent = "Copiado!";
  setTimeout(() => { s.textContent = ""; }, 2000);
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
  document.getElementById("status").textContent = "";
  document.getElementById("continuarCena").checked = false;
}

</script>

</body>
</html>
