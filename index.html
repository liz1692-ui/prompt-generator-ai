<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Prompt PRO</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, select, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    textarea {
      height: 260px;
      background: #1e293b;
      color: #22c55e;
    }
  </style>
</head>
<body>

<h2>🐱🐶 Gerador de Prompt PRO</h2>

<label>Fala do Gato:</label>
<input id="gato">

<label>Fala do Cachorro:</label>
<input id="cachorro">

<label>Quem começa:</label>
<select id="quem">
  <option value="gato">Gato</option>
  <option value="cachorro">Cachorro</option>
</select>

<!-- BOTÕES NOVOS -->
<button onclick="gerar('normal')">Normal</button>
<button onclick="gerar('engracado')">Engraçado</button>
<button onclick="gerar('treta')">Treta</button>
<button onclick="gerar('viral')">Viral Forte</button>

<button onclick="copiar()">Copiar Prompt</button>
<button onclick="limpar()">Limpar</button>

<textarea id="saida"></textarea>

<script>
function gerar(tipo) {
  const gato = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem = document.getElementById("quem").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let estilo = "";
  if (tipo === "normal") estilo = "tom natural";
  if (tipo === "engracado") estilo = "tom debochado e irônico";
  if (tipo === "treta") estilo = "tom provocador, leve tensão";
  if (tipo === "viral") estilo = "timing perfeito de humor, estilo meme";

  let prompt = `
Cena: podcast leve em estúdio moderno, iluminação quente.

À esquerda:
Um gato cinza, claramente o gato.

À direita:
Um cachorro caramelo, claramente o cachorro.

Regra obrigatória:
O gato nunca fala como cachorro.
O cachorro nunca fala como gato.
Cada personagem fala apenas na sua vez.

Sequência com tempo:
`;

  if (quem === "gato") {
    prompt += `
[0s - 3s]
O gato da esquerda fala (${estilo}):
"${gato}"

[3s - 4s]
O cachorro reage imediatamente olhando para o gato.

[4s - 6s]
O cachorro da direita responde sem hesitar:
"${cachorro}"
`;
  } else {
    prompt += `
[0s - 3s]
O cachorro da direita fala (${estilo}):
"${cachorro}"

[3s - 4s]
O gato reage imediatamente olhando para o cachorro.

[4s - 6s]
O gato da esquerda responde sem hesitar:
"${gato}"
`;
  }

  prompt += `
[6s - 8s]
Ambos reagem de forma compatível com o tom (${estilo}).
`;

  document.getElementById("saida").value = prompt.trim();
}

function copiar() {
  const texto = document.getElementById("saida");
  texto.select();
  document.execCommand("copy");
  alert("Prompt copiado!");
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
