<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador PRO</title>

<style>
body {
  font-family: Arial;
  background: #020617;
  color: white;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

h2 {
  text-align: center;
}

.box {
  background: #0f172a;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #1e293b;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.row {
  display: flex;
  gap: 10px;
}

.normal { background: #3b82f6; }
.engracado { background: #f59e0b; }
.treta { background: #ef4444; }
.viral { background: #8b5cf6; }
.lite { background: #22c55e; }
.extend { background: #06b6d4; }

.active {
  outline: 2px solid white;
}

textarea {
  width: 100%;
  height: 300px;
  margin-top: 20px;
  border-radius: 10px;
  padding: 15px;
  background: #020617;
  color: #22c55e;
}
</style>
</head>

<body>

<h2>🐱🐶 Gerador PRO</h2>

<div class="box">

<div class="row">
<button id="btnGato" onclick="setQuem('gato')" class="active">🐱 Gato</button>
<button id="btnCachorro" onclick="setQuem('cachorro')">🐶 Cachorro</button>
</div>

<input id="gato" placeholder="Fala do gato">
<input id="cachorro" placeholder="Fala do cachorro">

</div>

<div class="box">
<button class="normal" onclick="setEstilo('normal')">Normal</button>
<button class="engracado" onclick="setEstilo('engracado')">Engraçado</button>
<button class="treta" onclick="setEstilo('treta')">Treta</button>
<button class="viral" onclick="setEstilo('viral')">Viral</button>
</div>

<div class="box">
<button class="lite" onclick="gerar()">Gerar JSON</button>
<button class="extend" onclick="extender()">Extender Cena</button>
</div>

<textarea id="saida"></textarea>

<script>

let estilo = "normal";
let quemComeca = "gato";
let cena = null;

function setQuem(q) {
  quemComeca = q;

  document.getElementById("btnGato").classList.remove("active");
  document.getElementById("btnCachorro").classList.remove("active");

  if(q === "gato"){
    document.getElementById("btnGato").classList.add("active");
  } else {
    document.getElementById("btnCachorro").classList.add("active");
  }
}

function setEstilo(e){
  estilo = e;
}

function gerar(){

  let gato = document.getElementById("gato").value;
  let cachorro = document.getElementById("cachorro").value;

  if(!gato || !cachorro){
    alert("Preencha as falas");
    return;
  }

  let first, second;

  if(quemComeca === "gato"){
    first = { id:"character_LEFT", voice:"Rasalgethi", line:gato };
    second = { id:"character_RIGHT", voice:"Achird", line:cachorro };
  } else {
    first = { id:"character_RIGHT", voice:"Achird", line:cachorro };
    second = { id:"character_LEFT", voice:"Rasalgethi", line:gato };
  }

  cena = {
    veo_model: "VEO_LITE",
    style: estilo,

    camera: { duration_seconds: 8 },

    characters: [
      { id:"character_LEFT", voice_id:"Rasalgethi" },
      { id:"character_RIGHT", voice_id:"Achird" }
    ],

    sequence: [
      {
        timestamp:"0s-3.5s",
        character:first.id,
        voice:first.voice,
        action:"speaks",
        line:first.line
      },
      {
        timestamp:"3.5s-6.5s",
        character:second.id,
        voice:second.voice,
        action:"speaks",
        line:second.line
      },
      {
        timestamp:"6.5s-8s",
        action:"both_react_naturally"
      }
    ]
  };

  render();
}

function extender(){

  if(!cena){
    alert("Gere primeiro");
    return;
  }

  let dur = cena.camera.duration_seconds;

  let ultima = cena.sequence.filter(s => s.character).slice(-1)[0];

  let proximo = ultima.character === "character_LEFT"
    ? "character_RIGHT"
    : "character_LEFT";

  let voz = proximo === "character_LEFT"
    ? "Rasalgethi"
    : "Achird";

  cena.sequence.push(
    {
      timestamp: `${dur}s-${dur+4}s`,
      character: proximo,
      voice: voz,
      action:"speaks",
      line:"continua a conversa..."
    },
    {
      timestamp: `${dur+4}s-${dur+8}s`,
      action:"both_react_naturally"
    }
  );

  cena.camera.duration_seconds += 8;

  render();
}

function render(){
  document.getElementById("saida").value =
    JSON.stringify(cena, null, 2);
}

</script>

</body>
</html>
