<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Prompt PRO</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0f172a,#020617);
  color: white;
  padding: 20px;
  max-width: 700px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  margin-top: 15px;
  display: block;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 5px;
  background: #1e293b;
  color: white;
}

textarea {
  width: 100%;
  height: 320px;
  margin-top: 20px;
  border-radius: 12px;
  border: none;
  padding: 15px;
  background: #020617;
  color: #22c55e;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<h2>🐱🐶 Gerador de Prompt PRO</h2>

<label>Fala do Gato:</label>
<input id="gato" placeholder="Digite a fala do gato">

<label>Fala do Cachorro:</label>
<input id="cachorro" placeholder="Digite a fala do cachorro">

<label>Quem começa:</label>
<select id="quem">
  <option value="gato">Gato</option>
  <option value="cachorro">Cachorro</option>
</select>

<button onclick="gerar('normal')">Normal</button>
<button onclick="gerar('engracado')">Engraçado</button>
<button onclick="gerar('treta')">Treta</button>
<button onclick="gerar('viral')">Viral Forte</button>

<button onclick="copiar()">Copiar Prompt</button>
<button onclick="limpar()">Limpar</button>

<textarea id="saida" placeholder="Seu prompt vai aparecer aqui..."></textarea>

<script>
function gerar(tipo) {

  const gato = document.getElementById("gato").value.trim();
  const cachorro = document.getElementById("cachorro").value.trim();
  const quem = document.getElementById("quem").value;

  if (!gato || !cachorro) {
    alert("Preencha as falas!");
    return;
  }

  let estilo = "";
  if (tipo === "normal") estilo = "tom natural";
  if (tipo === "engracado") estilo = "tom debochado e irônico";
  if (tipo === "treta") estilo = "tom provocador, leve tensão";
  if (tipo === "viral") estilo = "timing perfeito de humor, estilo meme viral";

  let prompt = `
Cena: podcast leve em estúdio moderno, iluminação quente.

PERSONAGENS FIXOS (NUNCA MUDAR):

ESQUERDA:
GATO CINZA REALISTA.
Sem roupa.
Sem acessórios.
Sem humanização.
Aparência travada do início ao fim.
Voz fixa: Rasalgethi.

DIREITA:
CACHORRO CARAMELO REALISTA.
Sem roupa.
Sem acessórios.
Sem humanização.
Aparência travada do início ao fim.
Voz fixa: Achird.

REGRAS ABSOLUTAS:
- Nunca trocar personagens
- Nunca inverter falas
- Nunca inverter vozes
- Nunca adicionar roupas ou acessórios
- Nunca humanizar
- Quem fala move a boca
- Cada personagem fala apenas na sua vez
- Ignorar interpretações automáticas incorretas

SEQUÊNCIA:
`;

  if (quem === "gato") {

    prompt += `
[0s - 3s]
GATO da esquerda fala (${estilo}):
"${gato}"

[3s - 4s]
CACHORRO observa o gato.

[4s - 6s]
CACHORRO da direita responde:
"${cachorro}"
`;

  } else {

    prompt += `
[0s - 3s]
CACHORRO da direita fala (${estilo}):
"${cachorro}"

[3s - 4s]
GATO observa o cachorro.

[4s - 6s]
GATO da esquerda responde:
"${gato}"
`;

  }

  prompt += `
[6s - 8s]
Ambos reagem mantendo aparência e vozes fixas.
`;

  document.getElementById("saida").value = prompt.trim();
}

function copiar() {
  const texto = document.getElementById("saida");
  texto.select();
  document.execCommand("copy");
  alert("Copiado!");
}

function limpar() {
  document.getElementById("gato").value = "";
  document.getElementById("cachorro").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
